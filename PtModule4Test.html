<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste do Módulo 4 — Floresta Mecânica | Kodland</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        .quiz-header {
            background: linear-gradient(135deg,#B45309,#F59E0B);
            padding: 24px 32px;
            color: #fff;
            text-align: center
        }

            .quiz-header h2 {
                font-family: 'Nunito',sans-serif;
                font-size: 22px;
                font-weight: 900;
                color: #fff;
                margin-bottom: 4px
            }

            .quiz-header p {
                color: rgba(255,255,255,.85);
                font-size: 13px
            }

        .feedback-box {
            display: none;
            margin-top: 14px;
            border-radius: var(--rsm);
            padding: 13px 16px;
            font-size: 13.5px;
            line-height: 1.6;
            border: 2px solid
        }

            .feedback-box.show {
                display: block
            }

            .feedback-box.ok {
                background: var(--ok-bg);
                border-color: var(--ok-b);
                color: var(--ok-t)
            }

            .feedback-box.bad {
                background: var(--no-bg);
                border-color: var(--no-b);
                color: var(--no-t)
            }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-logo" onclick="goHome()" style="cursor:pointer">
            <span class="logo-mark">Kodland</span><div class="logo-div"></div>
            <span class="logo-sub">Treinamento de Tutores</span>
        </div>
        <div class="nav-r">
            <button class="nav-back" onclick="history.back()">← Módulo 4</button>
            <button class="icon-btn" id="theme-toggle">🌙</button>
        </div>
    </nav>
    <div class="progress-strip"><div class="progress-fill" id="top-progress" style="width:0%"></div></div>

    <div class="quiz-header">
        <h2>📝 Verificação de Conhecimento do Módulo 4</h2>
        <p>🌲 Floresta Mecânica · 6 Perguntas · 70% para Aprovação</p>
    </div>

    <div id="quiz-screen" class="quiz-wrap">
        <div class="q-progress">
            <div class="q-prog-track"><div class="q-prog-fill" id="q-prog" style="width:0%"></div></div>
            <span class="q-count" id="q-count">0 / 6</span>
        </div>
        <div id="question-area"></div>
        <div id="feedback-area"></div>
        <div class="btn-row" style="margin-top:16px">
            <button class="btn-primary" id="next-btn" onclick="nextQuestion()" style="display:none">Próxima Questão →</button>
            <button class="btn-primary" id="submit-btn" onclick="submitQuiz()" style="display:none">Enviar Respostas</button>
        </div>
    </div>

    <div id="results-screen" style="display:none;padding:40px 24px">
        <div class="result-card" id="result-card"></div>
        <div class="btn-row center" style="margin-top:20px" id="result-actions"></div>
    </div>

    <footer>© 2026 Kodland. Material de treinamento interno de tutores.</footer>
    <script src="shared.js"></script>
    <script>
        /*
          MÓDULO 4 — 6 QUESTÕES ÚNICAS (zero sobreposição com os Módulos 1-3 ou DST)
          Índices de respostas corretas (0=A, 1=B, 2=C, 3=D):
          Q1→C(2)  Q2→A(0)  Q3→D(3)  Q4→B(1)  Q5→C(2)  Q6→A(0)
          Padrão: 2,0,3,1,2,0 — variado, sem repetições idênticas consecutivas.
        */
        const MODULE_ID = 4;
        const PASS_PCT = 70;

        const QUESTIONS = [
            {
                q: "Um aluno programa o Agente para plantar uma grade 5×5 usando loops aninhados, mas o resultado é uma faixa diagonal de sementes em vez de uma grade. Após o loop interno terminar a fileira 1 e o código do loop externo executar 'agent mover para a direita 1', o Agente executa 'agent mover para trás 5'. O que há de errado com essa sequência?",
                opts: [
                    "O loop externo deve rodar 5 vezes para corresponder ao loop interno — ambos devem ter contagens idênticas",
                    "'Agent mover para a direita 1' e 'agent mover para trás 5' devem ser substituídos por um único comando 'agent tp'",
                    "Após concluir a fileira 1 movendo-se para a frente, o Agente se moveu 5 blocos na direção frontal. 'Mover para trás 5' o retorna ao início da coluna original. Mas também falta o 'dar a volta' — sem inverter a direção, a fileira 2 começa replantando a fileira 1 na direção oposta, e não uma fileira adjacente",
                    "A contagem do loop interno é muito alta — reduzi-la para 4 corrigirá o padrão diagonal"
                ],
                correct: 2,  // C
                feedback: "Correto. Após a fileira 1, o Agente está 5 blocos à frente e deve retornar à coluna inicial. 'Mover para trás 5' o retorna corretamente. Mas sem 'dar a volta' (duas curvas à direita ou equivalente), o Agente fica virado para a mesma direção da fileira 1 quando começa a fileira 2 — ele então planta a fileira 2 começando da posição original na mesma direção, criando um padrão diagonal ou sobreposto. A sequência correta: termine a fileira → mova para a direita 1 (mude para a próxima fileira) → dê a volta → mova para trás 0 (já no início da fileira 2) e plante."
            },
            {
                q: "Qual é a pré-condição crítica que deve ser atendida antes que o comando 'colocar ao mover para baixo' do Agente plante as culturas com sucesso, em vez de derrubar as sementes como entidades de itens soltos?",
                opts: [
                    "O solo diretamente abaixo do Agente deve ser terra arada (criada usando uma Enxada na terra/grama) que também esteja hidratada — a até 4 blocos de um bloco de fonte de água",
                    "O Agente deve ter pelo menos 32 sementes em seu inventário antes do início do loop de plantio",
                    "O jogador deve estar no mesmo chunk que o Agente para que o comando de plantio seja executado",
                    "A terra arada deve estar exatamente em Y=63 — plantar em qualquer outra altitude faz com que as sementes caiam"
                ],
                correct: 0,  // A
                feedback: "Correto. Duas condições devem ser atendidas: (1) o solo deve ser terra arada — use uma Enxada na terra ou grama para convertê-la. (2) A terra arada deve estar hidratada — deve haver um bloco de fonte de água a até 4 blocos (horizontalmente) da terra arada. A terra arada seca (cor bege-clara) voltará a ser terra comum e ejetará quaisquer culturas colocadas nela. A terra arada hidratada (castanho-escuro) retém as culturas plantadas e permite o crescimento."
            },
            {
                q: "O Funil (Hopper) de um aluno está posicionado diretamente abaixo da zona de queda da fazenda e está visível no mundo, mas os itens colhidos se acumulam no chão e nunca são coletados. Após 5 minutos, os itens desaparecem (despawn). Qual é a causa mais provável?",
                opts: [
                    "O inventário de 5 slots do funil está completamente cheio de itens de filtro — não restam slots vazios para novos itens",
                    "O Pistão que quebra as plantações está muito alto — os itens devem cair exatamente 1 bloco no Funil",
                    "A saída do Funil está bloqueada — ele foi conectado a um baú que já está cheio, de modo que o Funil não consegue transferir os itens e fica sobrecarregado, impedindo a entrada de novos itens",
                    "Os Funis não conseguem coletar itens que caem mais de 3 blocos — o Funil deve ser elevado a até 3 blocos da camada de cultivo"
                ],
                correct: 3,  // D
                feedback: "Correto. Quando o baú de saída de um Funil está completamente cheio, o Funil não consegue transferir mais nenhum item de seu próprio inventário de 5 slots. Assim que esses 5 slots se enchem, o Funil para de coletar itens de cima — os itens pousam na face superior do Funil, mas a entrada do Funil fica bloqueada porque seu buffer interno está na capacidade máxima. Solução: expanda o armazenamento (adicione mais baús em cadeia) ou separe os itens de cultivo das sementes usando uma etapa de ordenação para que a saída nunca encha um único baú completamente."
            },
            {
                q: "O protocolo de depuração 'testar em isolamento' para o Módulo 4 recomenda testar cada etapa do fluxo separadamente antes da integração. Em qual ordem as etapas devem ser testadas?",
                opts: [
                    "Armazenar primeiro, depois Coletar, depois Ativar, depois Detectar — teste de trás para frente, da saída para a entrada",
                    "Detectar primeiro (o Observador dispara com o crescimento da plantação usando uma Lâmpada), depois Ativar (o Pistão se estende a partir de uma Alavanca), depois Coletar (o Funil coleta itens dropados manualmente), por fim Armazenar (o Funil direciona para o baú) — teste cada etapa de forma independente antes de conectar",
                    "Construa e teste as quatro etapas simultaneamente — o teste em isolamento desperdiça tempo em uma sessão de 60 minutos",
                    "Ativar primeiro, depois Detectar, depois Armazenar, por fim Coletar — teste a etapa mais complexa antes das mais simples"
                ],
                correct: 1,  // B
                feedback: "Correto. O protocolo de isolamento segue a ordem do fluxo de dados: (1) Detectar — confirme se o Observador dispara quando as culturas crescem (teste com uma Lâmpada de Redstone como indicador). (2) Ativar — confirme se o Pistão se estende quando alimentado (teste com uma Alavanca manual, não com o Observador). (3) Coletar — confirme se o Funil suga os itens (jogue itens manualmente acima dele). (4) Armazenar — confirme se o Funil direciona para o baú correto (verifique com um único item). Uma vez que todos os quatro passem de forma independente, conecte-os. Isso evita falhas compostas que são difíceis de diagnosticar."
            },
            {
                q: "Qual enquadramento de linguagem um tutor deve usar ao explicar o circuito automatizado de colheita de culturas para crianças de 8 anos, a fim de fazer a ponte entre os conceitos de programação condicional do Módulo 3 e o hardware de Redstone do Módulo 4?",
                opts: [
                    "Notação de diagrama de circuito, usando símbolos eletrônicos padrão para interruptores, sensores e atuadores",
                    "Teoria matemática dos conjuntos — 'o evento de colheita é um membro do conjunto de eventos de mudança de estado de crescimento'",
                    "Linguagem Se–Então: 'SE o trigo atingir o estágio de crescimento 7 (totalmente crescido), ENTÃO o Observador dispara, ENTÃO o Pistão quebra as plantações, ENTÃO os itens caem' — descrevendo o comportamento do hardware usando o mesmo enquadramento condicional que os alunos conhecem do Módulo 3",
                    "Apenas linguagem de fluxograma — desenhe o fluxo em um quadro branco antes de construir qualquer bloco"
                ],
                correct: 2,  // C
                feedback: "Correto. O uso da linguagem Se–Então é a ponte pedagógica deliberada entre os Módulos 3 e 4. Os alunos já entendem 'se condição então ação' a partir das condicionais do MakeCode. Ao descrever o circuito de colheita de Redstone em uma linguagem idêntica ('SE o trigo estiver totalmente crescido, ENTÃO o Observador dispara, ENTÃO o Pistão se estende'), o tutor faz com que o circuito de hardware pareça uma lógica familiar, em vez de um conceito totalmente novo. Isso reduz drasticamente a carga cognitiva e ajuda os alunos a mapearem mentalmente os conceitos de software do Módulo 3 no hardware do Módulo 4."
            },
            {
                q: "Um aluno construiu com sucesso uma fazenda de bambu de fileira única no Módulo 1. No Módulo 4, ele deseja atualizá-la para uma fazenda automatizada de várias fileiras e várias culturas. Qual novo conceito do Módulo 4 permite especificamente ao Agente plantar várias fileiras sem que o aluno o reposicione manualmente entre as fileiras?",
                opts: [
                    "Loops aninhados — um loop externo itera sobre as fileiras, enquanto um loop interno gerencia o plantio das colunas dentro de cada fileira, com o código de reposicionamento entre as iterações do loop externo",
                    "O comando /clone do Módulo 2 — duplica o circuito de fileira única para criar várias fileiras",
                    "O evento Ao Quebrar Bloco do Módulo 3 — dispara o replantio automaticamente quando as culturas são colhidas",
                    "Repetidores de Redstone — adicionam atrasos de tempo entre a sequência de plantio de cada fileira"
                ],
                correct: 0,  // A
                feedback: "Correto. Loops aninhados são o conceito do Módulo 4 que permite o plantio automatizado de várias fileiras. O loop externo (repetir 5) itera sobre as fileiras; o loop interno (repetir 5) planta as sementes dentro de cada fileira. Entre as iterações do loop externo, o código de reposicionamento (mover para a direita 1, dar a volta) desloca o Agente para o início da próxima fileira. Este é o primeiro encontro do aluno com a iteração aninhada — um padrão de programação fundamental que prefigura diretamente a varredura de matrizes 2D em uma educação de programação mais avançada."
            }
        ];

        let current = 0, answers = [], answered = false;
        const LETTERS = ['A', 'B', 'C', 'D'];

        function renderQuestion() {
            const q = QUESTIONS[current];
            answered = false;
            document.getElementById('q-count').textContent = `${current} / ${QUESTIONS.length}`;
            document.getElementById('q-prog').style.width = `${current / QUESTIONS.length * 100}%`;
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('feedback-area').innerHTML = '';
            document.getElementById('question-area').innerHTML = `
        <div class="qnum">Questão ${current + 1} de ${QUESTIONS.length}</div>
        <div class="qtext">${q.q}</div>
        <div class="opt-list" id="opt-list">
          ${q.opts.map((o, i) => `
            <div class="opt" id="opt-${i}" onclick="selectOpt(${i})">
              <span class="opt-letter">${LETTERS[i]}</span><span>${o}</span>
            </div>`).join('')}
        </div>`;
        }

        function selectOpt(i) {
            if (answered) return;
            answered = true;
            const q = QUESTIONS[current];
            answers[current] = i;
            for (let j = 0; j < q.opts.length; j++) {
                const el = document.getElementById(`opt-${j}`);
                el.classList.add('disabled');
                if (j === q.correct) el.classList.add('correct');
                else if (j === i) el.classList.add('wrong');
            }
            const isRight = i === q.correct;
            document.getElementById('feedback-area').innerHTML = `
        <div class="feedback-box ${isRight ? 'ok' : 'bad'} show">
          ${isRight ? '✅ ' : '❌ '} ${q.feedback}
        </div>`;
            if (current < QUESTIONS.length - 1) document.getElementById('next-btn').style.display = 'inline-flex';
            else document.getElementById('submit-btn').style.display = 'inline-flex';
        }

        function nextQuestion() { current++; renderQuestion(); window.scrollTo(0, 0); }

        function submitQuiz() {
            const score = answers.filter((a, i) => a === QUESTIONS[i].correct).length;
            const pct = Math.round(score / QUESTIONS.length * 100);
            const passed = pct >= PASS_PCT;
            if (passed) { const prev = getModuleScore(MODULE_ID); if (!prev || pct > prev) markModulePassed(MODULE_ID, pct); }
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('results-screen').style.display = 'block';
            document.getElementById('result-card').innerHTML = `
        <div class="result-emoji">${passed ? '🎉' : '😅'}</div>
        <div class="result-title">${passed ? 'Módulo 4 Concluído!' : 'Não Foi Dessa Vez'}</div>
        <div class="result-pct ${passed ? 'pass' : 'fail'}">${pct}%</div>
        <div class="result-sub">Você respondeu corretamente a <strong>${score} de ${QUESTIONS.length}</strong> questões.
          ${passed ? ' Excelente — Módulo 4 concluído! Você já pode acessar o Módulo 5.'
                    : ` Uma pontuação de <strong>${PASS_PCT}%</strong> é necessária. Revise o Módulo 4 e tente novamente.`}
        </div>`;
            document.getElementById('result-actions').innerHTML = passed
                ? `<a href="PtModule5.html" class="btn-primary">Continuar para o Módulo 5 →</a>
           <button class="btn-outline" onclick="goHome()">← Painel</button>`
                : `<button class="btn-primary" onclick="retake()">Refazer Teste</button>
           <a href="PtModule4.html" class="btn-outline">← Revisar Módulo 4</a>`;
            window.scrollTo(0, 0);
        }

        function retake() {
            current = 0; answers = [];
            document.getElementById('quiz-screen').style.display = 'block';
            document.getElementById('results-screen').style.display = 'none';
            renderQuestion(); window.scrollTo(0, 0);
        }

        initShared();
        if (!isModuleUnlocked(MODULE_ID)) { alert('Por favor, conclua os módulos anteriores primeiro.'); goHome(); }
        document.getElementById('top-progress').style.width = `${getOverallProgress() / 5 * 100}%`;
        renderQuestion();
    </script>
</body>
</html>
