<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen del Módulo 2 — Ciudad de la Luz | Kodland</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        .quiz-header {
            background: linear-gradient(135deg,#1D4ED8,#3B82F6);
            padding: 24px 32px;
            color: #fff;
            text-align: center
        }

            .quiz-header h2 {
                font-family: 'Nunito',sans-serif;
                font-size: 22px;
                font-weight: 900;
                color: #fff;
                margin-bottom: 4px
            }

            .quiz-header p {
                color: rgba(255,255,255,.8);
                font-size: 13px
            }

        .feedback-box {
            display: none;
            margin-top: 14px;
            border-radius: var(--rsm);
            padding: 13px 16px;
            font-size: 13.5px;
            line-height: 1.6;
            border: 2px solid
        }

            .feedback-box.show {
                display: block
            }

            .feedback-box.ok {
                background: var(--ok-bg);
                border-color: var(--ok-b);
                color: var(--ok-t)
            }

            .feedback-box.bad {
                background: var(--no-bg);
                border-color: var(--no-b);
                color: var(--no-t)
            }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-logo" onclick="goHome()" style="cursor:pointer">
            <span class="logo-mark">Kodland</span><div class="logo-div"></div>
            <span class="logo-sub">Formación de Tutores</span>
        </div>
        <div class="nav-r">
            <button class="nav-back" onclick="history.back()">← Módulo 2</button>
            <button class="icon-btn" id="theme-toggle">🌙</button>
        </div>
    </nav>
    <div class="progress-strip"><div class="progress-fill" id="top-progress" style="width:0%"></div></div>

    <div class="quiz-header">
        <h2>📝 Verificación de Conocimientos Módulo 2</h2>
        <p>🏙️ Ciudad de la Luz · 6 Preguntas · 70% para Aprobar</p>
    </div>

    <div id="quiz-screen" class="quiz-wrap">
        <div class="q-progress">
            <div class="q-prog-track"><div class="q-prog-fill" id="q-prog" style="width:0%"></div></div>
            <span class="q-count" id="q-count">0 / 6</span>
        </div>
        <div id="question-area"></div>
        <div id="feedback-area"></div>
        <div class="btn-row" style="margin-top:16px">
            <button class="btn-primary" id="next-btn" onclick="nextQuestion()" style="display:none">Siguiente Pregunta →</button>
            <button class="btn-primary" id="submit-btn" onclick="submitQuiz()" style="display:none">Enviar Respuestas</button>
        </div>
    </div>

    <div id="results-screen" style="display:none;padding:40px 24px">
        <div class="result-card" id="result-card"></div>
        <div class="btn-row center" style="margin-top:20px" id="result-actions"></div>
    </div>

    <footer>© 2026 Kodland. Material de capacitación interna para tutores.</footer>
    <script src="shared.js"></script>
    <script>
        /*
          MÓDULO 2 — 6 PREGUNTAS ÚNICAS (sin duplicación con el Módulo 1 o el DST)
          Índices de respuestas correctas (0=A, 1=B, 2=C, 3=D):
          Q1→D(3)  Q2→A(0)  Q3→C(2)  Q4→B(1)  Q5→D(3)  Q6→A(0)
          Patrón: 3,0,2,1,3,0 — variado, sin repeticiones consecutivas.
        */
        const MODULE_ID = 2;
        const PASS_PCT = 70;

        const QUESTIONS = [
            {
                q: "Un estudiante ejecuta /clone 100 64 200  104 68 204  100 64 200 y no sucede nada. ¿Cuál es la causa y la solución correcta?",
                opts: [
                    "El destino está demasiado lejos: /clone tiene un alcance máximo de 10 bloques",
                    "La coordenada Y del destino siempre debe ser 0",
                    "El comando se escribió correctamente: el clon siempre aparece tras un retraso de 5 segundos",
                    "Las regiones de origen y destino se superponen: las coordenadas de destino deben estar fuera de la caja de colisión de origen"
                ],
                correct: 3,  // D
                feedback: "¡Correcto! El destino de /clone [100 64 200] es idéntico a la primera esquina del origen: las regiones se superponen por completo, provocando una falla silenciosa. El destino debe ser un par de coordenadas que se encuentre totalmente fuera de la caja de colisión de origen (por ejemplo, /clone 100 64 200  104 68 204  120 64 200)."
            },
            {
                q: "Un estudiante escribe /tp @s ~0 64 ~0. ¿Qué hace este comando de manera diferente a /tp @s ~0 ~0 ~0 y a /tp @s 0 64 0?",
                opts: [
                    "Conserva las posiciones actuales de X y Z del estudiante pero define su altitud exactamente en Y=64, combinando un valor absoluto con dos desplazamientos relativos",
                    "Teletransporta al estudiante al origen del mundo exactamente al nivel del mar",
                    "Teletransporta a todos los jugadores (~0) al piso 64 — @s es el selector para todos los estudiantes",
                    "Es una sintaxis inválida: no se pueden mezclar tildes y valores absolutos en un solo comando /tp"
                ],
                correct: 0,  // A
                feedback: "¡Correcto! Minecraft permite una sintaxis de coordenadas mixta. ~0 mantiene la X actual sin cambios; 64 (sin tilde) define la altitud exactamente en Y=64; ~0 mantiene la Z actual sin cambios. Esto es muy útil para comandos como 'ajustar al nivel del mar' sin modificar la posición horizontal. /tp @s ~0 ~0 ~0 no mueve al jugador en absoluto; /tp @s 0 64 0 lo envía al origen del mundo."
            },
            {
                q: "La cuadrícula de la mesa de crafteo tiene 9 ranuras. Un estudiante coloca dos bloques de piedra lado a lado en la fila superior de la mesa de crafteo y no obtiene nada. ¿Cuál es el problema?",
                opts: [
                    "Las placas de presión de piedra requieren tres bloques de piedra, no dos",
                    "La mesa de crafteo debe colocarse en el suelo antes de que las recetas funcionen",
                    "La receta de la placa de presión de piedra requiere dos bloques de piedra colocados en un patrón horizontal de 1×2 en cualquier fila; el estudiante probablemente los colocó en las ranuras 1 y 3 en lugar de la 1 y la 2 (adyacentes), saltándose la ranura del medio",
                    "La piedra no se puede utilizar en la mesa de crafteo: requiere piedra base (Cobblestone)"
                ],
                correct: 2,  // C
                feedback: "¡Correcto! La receta de la placa de presión de piedra requiere dos bloques de piedra en ranuras adyacentes horizontalmente (en cualquier fila). Si el estudiante se saltó la ranura del medio —colocando piedra en las posiciones 1 y 3 en lugar de la 1 y la 2—, el patrón de la cuadrícula no coincidirá con ninguna receta y no se producirá nada. Las recetas de crafteo dependen estrictamente de la posición."
            },
            {
                q: "Durante la construcción cooperativa de la ciudad, un estudiante destruye accidentalmente 10 bloques del puente de otro equipo. De acuerdo con el marco de las Reglas del Vecindario, ¿cuál es la respuesta correcta del tutor?",
                opts: [
                    "Remover al estudiante de la sesión temporalmente como una consecuencia clara por la infracción",
                    "Hacer referencia a la Regla del Vecindario por su nombre, guiar al estudiante para que ayude a reconstruir los bloques dañados y usar el momento para reforzar los estándares comunitarios sin un lenguaje punitivo",
                    "Ignorarlo a menos que el estudiante afectado se queje, para evitar empeorar la situación",
                    "Pausar toda la sesión y restablecer el mundo a como estaba antes de que ocurriera el daño"
                ],
                correct: 1,  // B
                feedback: "¡Correcto! Las respuestas punitivas (la expulsión o la pausa de la sesión) generan resentimiento y crean un tono temeroso en el aula. El marco de las Reglas del Vecindario es restaurativo, no punitivo: menciona la regla ('Recuerda la Regla del Vecindario'), guía al estudiante para reconstruir lo roto y utilízalo como un momento para los estándares de la comunidad. Esto modela las normas de colaboración del mundo real que la actividad de construcción de la ciudad está diseñada para practicar."
            },
            {
                q: "Una trampa de placa de presión está cableada a un dispensador a 20 bloques de distancia. Un estudiante pisa la placa pero el dispensador se activa con un notable retraso de 1 segundo. ¿Cuál es la causa técnica?",
                opts: [
                    "El dispensador necesita un repetidor de Redstone a su lado para disparar a velocidad normal",
                    "Hay un espacio vacío en el cable de Redstone que está ralentizando la señal",
                    "La placa de presión solo se activa en el segundo paso, no en el primero",
                    "Las señales de Redstone viajan a 1 bloque por tick (0.05 segundos); a lo largo de 20 bloques de polvo, la señal tarda 20 ticks = 1 segundo en llegar al dispensador; este es el comportamiento esperado de la física, no un bug"
                ],
                correct: 3,  // D
                feedback: "¡Correcto! La velocidad de propagación de la señal de Redstone es de 1 bloque por tick, y un tick equivale a 0.05 segundos. Por lo tanto, un cable de 20 bloques introduce un retraso de 20 ticks = 1 segundo. Esto forma parte de la física normal de Minecraft. Si se necesita una respuesta más rápida, se debe acortar el cable o usar un comparador de Redstone para amplificar sin retrasos. Importante: esta es una oportunidad de enseñanza sobre la propagación de señales, no un error que se deba 'solucionar'."
            },
            {
                q: "Después de la sesión cooperativa de hoy, un tutor quiere ofrecer un elogio específico vinculado al comportamiento al equipo de Constructores de Puentes. ¿Cuál de los siguientes es el ejemplo más efectivo?",
                opts: [
                    "\"Excelente trabajo, Constructores de Puentes: utilizaron coordenadas exactas para alinear los extremos de su puente con los distritos de ambos equipos, y su diseño de arco demuestra que pensaron en la simetría. Eso es pensamiento arquitectónico profesional.\"",
                    "\"¡Gran trabajo hoy, equipo! ¡Construyeron un puente muy bonito!\"",
                    "\"Los Constructores de Puentes fueron el mejor equipo hoy; mucho mejor que los demás.\"",
                    "\"Lo hicieron bien. Les daré una tarea adicional la próxima vez como recompensa.\""
                ],
                correct: 0,  // A
                feedback: "¡Correcto! La opción A es específica y vinculada al comportamiento: nombra la acción técnica exacta ('utilizaron coordenadas exactas para alinear los extremos'), el principio de diseño aplicado ('simetría') y lo enmarca en términos profesionales ('pensamiento arquitectónico'). Esto brinda a los estudiantes información clara sobre qué comportamiento repetir. El elogio genérico ('¡gran puente!'), el elogio comparativo ('el mejor equipo') y las recompensas diferidas no crean el mismo bucle de refuerzo."
            }
        ];

        let current = 0, answers = [], answered = false;
        const LETTERS = ['A', 'B', 'C', 'D'];

        function renderQuestion() {
            const q = QUESTIONS[current];
            answered = false;
            document.getElementById('q-count').textContent = `${current} / ${QUESTIONS.length}`;
            document.getElementById('q-prog').style.width = `${current / QUESTIONS.length * 100}%`;
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('feedback-area').innerHTML = '';
            document.getElementById('question-area').innerHTML = `
        <div class="qnum">Pregunta ${current + 1} de ${QUESTIONS.length}</div>
        <div class="qtext">${q.q}</div>
        <div class="opt-list" id="opt-list">
          ${q.opts.map((o, i) => `
            <div class="opt" id="opt-${i}" onclick="selectOpt(${i})">
              <span class="opt-letter">${LETTERS[i]}</span><span>${o}</span>
            </div>`).join('')}
        </div>`;
        }

        function selectOpt(i) {
            if (answered) return;
            answered = true;
            const q = QUESTIONS[current];
            answers[current] = i;
            for (let j = 0; j < q.opts.length; j++) {
                const el = document.getElementById(`opt-${j}`);
                el.classList.add('disabled');
                if (j === q.correct) el.classList.add('correct');
                else if (j === i) el.classList.add('wrong');
            }
            const isRight = i === q.correct;
            document.getElementById('feedback-area').innerHTML = `
        <div class="feedback-box ${isRight ? 'ok' : 'bad'} show">
          ${isRight ? '✅ ' : '❌ '} ${q.feedback}
        </div>`;
            if (current < QUESTIONS.length - 1) document.getElementById('next-btn').style.display = 'inline-flex';
            else document.getElementById('submit-btn').style.display = 'inline-flex';
        }

        function nextQuestion() { current++; renderQuestion(); window.scrollTo(0, 0); }

        function submitQuiz() {
            const score = answers.filter((a, i) => a === QUESTIONS[i].correct).length;
            const pct = Math.round(score / QUESTIONS.length * 100);
            const passed = pct >= PASS_PCT;
            if (passed) { const prev = getModuleScore(MODULE_ID); if (!prev || pct > prev) markModulePassed(MODULE_ID, pct); }
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('results-screen').style.display = 'block';
            document.getElementById('result-card').innerHTML = `
        <div class="result-emoji">${passed ? '🎉' : '😅'}</div>
        <div class="result-title">${passed ? '¡Módulo 2 Completado!' : 'Aún no estás listo'}</div>
        <div class="result-pct ${passed ? 'pass' : 'fail'}">${pct}%</div>
        <div class="result-sub">Respondiste correctamente <strong>${score} de ${QUESTIONS.length}</strong>.
          ${passed ? ' Excelente trabajo: has demostrado un sólido entendimiento del contenido del Módulo 2.'
                    : ` Se requiere una puntuación del <strong>${PASS_PCT}%</strong> para desbloquear el Módulo 3. Revisa el material e inténtalo de nuevo.`}
        </div>`;
            document.getElementById('result-actions').innerHTML = passed
                ? `<a href="EsModule3.html" class="btn-primary">Continuar al Módulo 3 →</a>
           <button class="btn-outline" onclick="goHome()">← Panel Principal</button>`
                : `<button class="btn-primary" onclick="retake()">Repetir Examen</button>
           <a href="EsModule2.html" class="btn-outline">← Revisar Módulo 2</a>`;
            window.scrollTo(0, 0);
        }

        function retake() {
            current = 0; answers = [];
            document.getElementById('quiz-screen').style.display = 'block';
            document.getElementById('results-screen').style.display = 'none';
            renderQuestion(); window.scrollTo(0, 0);
        }

        initShared();
        if (!isModuleUnlocked(MODULE_ID)) { alert('Por favor, completa el Módulo 1 primero.'); goHome(); }
        document.getElementById('top-progress').style.width = `${getOverallProgress() / 5 * 100}%`;
        renderQuestion();
    </script>
</body>
</html>
