<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen del Módulo 3 — Oasis de la Lógica | Kodland</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        .quiz-header {
            background: linear-gradient(135deg,#6D28D9,#8B5CF6);
            padding: 24px 32px;
            color: #fff;
            text-align: center
        }

            .quiz-header h2 {
                font-family: 'Nunito',sans-serif;
                font-size: 22px;
                font-weight: 900;
                color: #fff;
                margin-bottom: 4px
            }

            .quiz-header p {
                color: rgba(255,255,255,.8);
                font-size: 13px
            }

        .feedback-box {
            display: none;
            margin-top: 14px;
            border-radius: var(--rsm);
            padding: 13px 16px;
            font-size: 13.5px;
            line-height: 1.6;
            border: 2px solid
        }

            .feedback-box.show {
                display: block
            }

            .feedback-box.ok {
                background: var(--ok-bg);
                border-color: var(--ok-b);
                color: var(--ok-t)
            }

            .feedback-box.bad {
                background: var(--no-bg);
                border-color: var(--no-b);
                color: var(--no-t)
            }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-logo" onclick="goHome()" style="cursor:pointer">
            <span class="logo-mark">Kodland</span><div class="logo-div"></div>
            <span class="logo-sub">Formación de Tutores</span>
        </div>
        <div class="nav-r">
            <button class="nav-back" onclick="history.back()">← Módulo 3</button>
            <button class="icon-btn" id="theme-toggle">🌙</button>
        </div>
    </nav>
    <div class="progress-strip"><div class="progress-fill" id="top-progress" style="width:0%"></div></div>

    <div class="quiz-header">
        <h2>📝 Verificación de Conocimientos Módulo 3</h2>
        <p>🧩 Oasis de la Lógica · 6 Preguntas · 70% para Aprobar</p>
    </div>

    <div id="quiz-screen" class="quiz-wrap">
        <div class="q-progress">
            <div class="q-prog-track"><div class="q-prog-fill" id="q-prog" style="width:0%"></div></div>
            <span class="q-count" id="q-count">0 / 6</span>
        </div>
        <div id="question-area"></div>
        <div id="feedback-area"></div>
        <div class="btn-row" style="margin-top:16px">
            <button class="btn-primary" id="next-btn" onclick="nextQuestion()" style="display:none">Siguiente Pregunta →</button>
            <button class="btn-primary" id="submit-btn" onclick="submitQuiz()" style="display:none">Enviar Respuestas</button>
        </div>
    </div>

    <div id="results-screen" style="display:none;padding:40px 24px">
        <div class="result-card" id="result-card"></div>
        <div class="btn-row center" style="margin-top:20px" id="result-actions"></div>
    </div>

    <footer>© 2026 Kodland. Material de capacitación interna para tutores.</footer>
    <script src="shared.js"></script>
    <script>
        /*
          MÓDULO 3 — 6 PREGUNTAS ÚNICAS (sin duplicación con los Módulos 1-2 o el DST)
          Índices de respuestas correctas (0=A, 1=B, 2=C, 3=D):
          Q1→B(1)  Q2→C(2)  Q3→A(0)  Q4→D(3)  Q5→B(1)  Q6→C(2)
          Patrón: 1,2,0,3,1,2 — variado, sin repeticiones consecutivas.
        */
        const MODULE_ID = 3;
        const PASS_PCT = 70;

        const QUESTIONS = [
            {
                q: "La variable 'score' de un estudiante siempre muestra el valor 1 inmediatamente cuando el programa comienza, antes de que el jugador haya caminado. ¿Cuál es la causa precisa?",
                opts: [
                    "El evento 'Al caminar el jugador' se dispara automáticamente una vez al inicializar el programa",
                    "El bloque de inicialización 'asignar score = 0' está dentro del evento 'Al caminar el jugador', por lo que cada paso reinicia la puntuación a 0 antes de incrementarla, haciendo que siempre sea 1",
                    "Las variables de MakeCode siempre comienzan en 1 a menos que se definan explícitamente en un bloque 'Al iniciar'",
                    "El bloque 'cambiar score por 1' se está ejecutando en un bucle infinito en segundo plano"
                ],
                correct: 1,  // B
                feedback: "¡Correcto! Si el bloque 'asignar score = 0' se coloca dentro del evento 'Al caminar', la secuencia en cada paso será: (1) asignar score a 0, (2) cambiar score por 1; por lo tanto, score siempre valdrá 1. La solución es mover 'asignar score = 0' a un bloque 'Al iniciar' para que se ejecute una sola vez al arrancar el programa."
            },
            {
                q: "Un estudiante quiere que la condición de victoria se active cuando el jugador haya recolectado 10 o más gemas, pero la condición nunca se dispara incluso cuando gems = 12. El código dice: 'si gems = 10 entonces { mostrar \"¡Ganaste!\" }'. ¿Cuál es el problema y la solución?",
                opts: [
                    "La variable debe llamarse obligatoriamente 'score' y no 'gems' — MakeCode solo reconoce nombres por defecto",
                    "El bloque 'mostrar' debe reemplazarse por un bloque 'imprimir' dentro de los condicionales",
                    "La condición utiliza el operador = (exactamente igual a 10) en lugar de ≥ (mayor o igual que 10) — si el jugador recolecta 12, gems nunca es exactamente igual a 10, por lo que la condición nunca es verdadera",
                    "Los condicionales no pueden leer variables directamente — se debe añadir primero un bloque separado de lectura"
                ],
                correct: 2,  // C
                feedback: "¡Correcto! Con la condición 'gems = 10', el programa comprueba si la variable es exactamente igual a 10. Si el jugador recolecta gemas en grupos (por ejemplo, de +3 en +3), el contador salta de 9 a 12, saltándose el 10 por completo. La condición nunca se cumple. Solución: cambia el operador a ≥ (mayor o igual que), el cual se activará cuando gems alcance el 10 o cualquier valor superior."
            },
            {
                q: "¿Cuál de las siguientes opciones describe correctamente el alcance de las variables en MakeCode Education?",
                opts: [
                    "Todas las variables son globales — cualquier bloque de evento en cualquier parte del programa puede leer y modificar cualquier variable",
                    "Las variables son locales al bloque de evento en el que se crean — otros bloques no pueden acceder a ellas",
                    "Las variables solo existen mientras el bloque de evento que las creó se encuentra activo y ejecutándose",
                    "Las variables en MakeCode deben declararse con un tipo específico (número, texto o booleano) antes de poder usarse"
                ],
                correct: 0,  // A
                feedback: "¡Correcto! En MakeCode Education, todas las variables son globales por defecto. Una variable creada en un bloque 'Al iniciar' es completamente accesible y modificable dentro de 'Al caminar el jugador', 'Al romper un bloque' y cualquier otro bloque de evento. No existen entornos de variables locales. Esto simplifica la programación para los alumnos, pero requiere atención para evitar que un evento sobrescriba accidentalmente una variable."
            },
            {
                q: "Tras alcanzar la condición de victoria (score ≥ 10), la animación de fuegos artificiales de un estudiante se activa en cada paso de caminata, no solo una vez. ¿Cuál es la causa técnica más precisa?",
                opts: [
                    "El bloque de fuegos artificiales tiene una configuración de repetición interna configurada como 'infinita'",
                    "El evento 'Al caminar el jugador' posee un bug de doble disparo integrado que se activa dos veces por paso",
                    "El operador de comparación ≥ debería cambiarse por = para evitar que la condición se vuelva a activar",
                    "La puntuación no se está reiniciando a 0 (o no se está modificando el estado del juego) dentro del bloque de la condición de victoria — score sigue siendo ≥ 10 tras ganar por primera vez, por lo que cada paso posterior vuelve a cumplir la condición"
                ],
                correct: 3,  // D
                feedback: "¡Correcto! Tras dispararse la victoria, si score permanece en 10 o más, cada paso posterior evaluará 'si score ≥ 10' → verdadero → fuegos artificiales de nuevo. Solución: añade 'asignar score = 0' como la última línea dentro del bloque de victoria (reinicia para volver a jugar), o introduce una variable booleana 'gameActive' configurada en falso al ganar, envolviendo luego todo el bloque de caminar en un 'si gameActive = verdadero'."
            },
            {
                q: "Un tutor quiere ayudar a un estudiante a evitar colocar código fuera del bloque de evento. ¿Qué técnica pedagógica es más efectiva antes de que el estudiante comience a programar?",
                opts: [
                    "Pedir al estudiante que mire la pantalla del tutor mientras este construye el programa para luego copiarlo",
                    "Pedir al estudiante que dibuje un rectángulo en papel, lo rotule con el nombre del bloque de evento y decida físicamente qué instrucciones van dentro y cuáles fuera antes de tocar MakeCode",
                    "Entregar al estudiante un programa preconstruido para que lo modifique en lugar de programar desde cero",
                    "Indicar al estudiante que revise la página de documentación de MakeCode si tiene dudas sobre la colocación de bloques"
                ],
                correct: 1,  // B
                feedback: "¡Correcto! La técnica de 'dibujar los límites del bloque' exterioriza físicamente la tarea cognitiva de contener bloques. Los estudiantes que dibujan el rectángulo antes de programar cometen el error de posicionamiento externo significativamente menos veces, porque el límite se convierte en un concepto espacial tangible en lugar de una regla estructural abstracta. Además, fomenta el hábito profesional de planificar antes de codificar."
            },
            {
                q: "Un estudiante desea que su programa muestre el texto 'Puntuación Actual: 7' cuando el jugador camina. Coloca un bloque 'mostrar' que contiene únicamente la variable 'score'. La salida muestra '7' pero no el texto de la etiqueta. ¿Cómo debería solucionarse?",
                opts: [
                    "Añadir un segundo bloque 'mostrar' independiente que enseñe solo el texto de la etiqueta; MakeCode los presentará juntos",
                    "Utilizar un bloque 'imprimir' en lugar de 'mostrar' — imprimir admite texto combinado",
                    "Utilizar un bloque de unión de texto ('join') para concatenar la cadena \"Puntuación Actual: \" con la variable score, entregando luego el resultado combinado a un único bloque 'mostrar'",
                    "Las variables no pueden mostrarse dentro del juego usando el bloque 'mostrar' — deben enseñarse únicamente en la consola de MakeCode"
                ],
                correct: 2,  // C
                feedback: "¡Correcto! El bloque 'mostrar' acepta un único elemento. Para combinar texto y una variable, los estudiantes deben usar el bloque de unir texto: [unir [\"Puntuación Actual: \"] [score]]. Esto genera la cadena combinada única \"Puntuación Actual: 7\", que luego se entrega a 'mostrar'. Dos bloques 'mostrar' independientes enseñarían los valores en líneas separadas y no combinados."
            }
        ];

        let current = 0, answers = [], answered = false;
        const LETTERS = ['A', 'B', 'C', 'D'];

        function renderQuestion() {
            const q = QUESTIONS[current];
            answered = false;
            document.getElementById('q-count').textContent = `${current} / ${QUESTIONS.length}`;
            document.getElementById('q-prog').style.width = `${current / QUESTIONS.length * 100}%`;
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('feedback-area').innerHTML = '';
            document.getElementById('question-area').innerHTML = `
        <div class="qnum">Pregunta ${current + 1} de ${QUESTIONS.length}</div>
        <div class="qtext">${q.q}</div>
        <div class="opt-list" id="opt-list">
          ${q.opts.map((o, i) => `
            <div class="opt" id="opt-${i}" onclick="selectOpt(${i})">
              <span class="opt-letter">${LETTERS[i]}</span><span>${o}</span>
            </div>`).join('')}
        </div>`;
        }

        function selectOpt(i) {
            if (answered) return;
            answered = true;
            const q = QUESTIONS[current];
            answers[current] = i;
            for (let j = 0; j < q.opts.length; j++) {
                const el = document.getElementById(`opt-${j}`);
                el.classList.add('disabled');
                if (j === q.correct) el.classList.add('correct');
                else if (j === i) el.classList.add('wrong');
            }
            const isRight = i === q.correct;
            document.getElementById('feedback-area').innerHTML = `
        <div class="feedback-box ${isRight ? 'ok' : 'bad'} show">
          ${isRight ? '✅ ' : '❌ '} ${q.feedback}
        </div>`;
            if (current < QUESTIONS.length - 1) document.getElementById('next-btn').style.display = 'inline-flex';
            else document.getElementById('submit-btn').style.display = 'inline-flex';
        }

        function nextQuestion() { current++; renderQuestion(); window.scrollTo(0, 0); }

        function submitQuiz() {
            const score = answers.filter((a, i) => a === QUESTIONS[i].correct).length;
            const pct = Math.round(score / QUESTIONS.length * 100);
            const passed = pct >= PASS_PCT;
            if (passed) { const prev = getModuleScore(MODULE_ID); if (!prev || pct > prev) markModulePassed(MODULE_ID, pct); }
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('results-screen').style.display = 'block';
            document.getElementById('result-card').innerHTML = `
        <div class="result-emoji">${passed ? '🎉' : '😅'}</div>
        <div class="result-title">${passed ? '¡Módulo 3 Completo!' : 'Aún no estás listo'}</div>
        <div class="result-pct ${passed ? 'pass' : 'fail'}">${pct}%</div>
        <div class="result-sub">Respondiste correctamente <strong>${score} de ${QUESTIONS.length}</strong>.
          ${passed ? ' ¡Excelente — Módulo 3 aprobado!'
                    : ` Se requiere una puntuación del <strong>${PASS_PCT}%</strong>. Revisa el material e inténtalo de nuevo.`}
        </div>`;
            document.getElementById('result-actions').innerHTML = passed
                ? `<a href="EsModule4.html" class="btn-primary">Continuar al Módulo 4 →</a>
           <button class="btn-outline" onclick="goHome()">← Panel Principal</button>`
                : `<button class="btn-primary" onclick="retake()">Repetir Examen</button>
           <a href="EsModule3.html" class="btn-outline">← Revisar Módulo 3</a>`;
            window.scrollTo(0, 0);
        }

        function retake() {
            current = 0; answers = [];
            document.getElementById('quiz-screen').style.display = 'block';
            document.getElementById('results-screen').style.display = 'none';
            renderQuestion(); window.scrollTo(0, 0);
        }

        initShared();
        if (!isModuleUnlocked(MODULE_ID)) { alert('Por favor, completa los módulos anteriores primero.'); goHome(); }
        document.getElementById('top-progress').style.width = `${getOverallProgress() / 5 * 100}%`;
        renderQuestion();
    </script>
</body>
</html>
