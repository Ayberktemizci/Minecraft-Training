<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Modulo 3 — Oasi della Logica | Kodland</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        .quiz-header {
            background: linear-gradient(135deg,#6D28D9,#8B5CF6);
            padding: 24px 32px;
            color: #fff;
            text-align: center
        }

            .quiz-header h2 {
                font-family: 'Nunito',sans-serif;
                font-size: 22px;
                font-weight: 900;
                color: #fff;
                margin-bottom: 4px
            }

            .quiz-header p {
                color: rgba(255,255,255,.8);
                font-size: 13px
            }

        .feedback-box {
            display: none;
            margin-top: 14px;
            border-radius: var(--rsm);
            padding: 13px 16px;
            font-size: 13.5px;
            line-height: 1.6;
            border: 2px solid
        }

            .feedback-box.show {
                display: block
            }

            .feedback-box.ok {
                background: var(--ok-bg);
                border-color: var(--ok-b);
                color: var(--ok-t)
            }

            .feedback-box.bad {
                background: var(--no-bg);
                border-color: var(--no-b);
                color: var(--no-t)
            }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-logo" onclick="goHome()" style="cursor:pointer">
            <span class="logo-mark">Kodland</span><div class="logo-div"></div>
            <span class="logo-sub">Formazione Tutor</span>
        </div>
        <div class="nav-r">
            <button class="nav-back" onclick="history.back()">← Modulo 3</button>
            <button class="icon-btn" id="theme-toggle">🌙</button>
        </div>
    </nav>
    <div class="progress-strip"><div class="progress-fill" id="top-progress" style="width:0%"></div></div>

    <div class="quiz-header">
        <h2>📝 Verifica delle Conoscenze Modulo 3</h2>
        <p>🧩 Oasi della Logica · 6 Domande · 70% per Superare</p>
    </div>

    <div id="quiz-screen" class="quiz-wrap">
        <div class="q-progress">
            <div class="q-prog-track"><div class="q-prog-fill" id="q-prog" style="width:0%"></div></div>
            <span class="q-count" id="q-count">0 / 6</span>
        </div>
        <div id="question-area"></div>
        <div id="feedback-area"></div>
        <div class="btn-row" style="margin-top:16px">
            <button class="btn-primary" id="next-btn" onclick="nextQuestion()" style="display:none">Prossima Domanda →</button>
            <button class="btn-primary" id="submit-btn" onclick="submitQuiz()" style="display:none">Invia le Risposte</button>
        </div>
    </div>

    <div id="results-screen" style="display:none;padding:40px 24px">
        <div class="result-card" id="result-card"></div>
        <div class="btn-row center" style="margin-top:20px" id="result-actions"></div>
    </div>

    <footer>© 2026 Kodland. Materiale di formazione interna per i tutor.</footer>
    <script src="shared.js"></script>
    <script>
        /*
          MODULO 3 — 6 DOMANDE UNICHE (nessuna sovrapposizione con i Moduli 1-2 o il DST)
          Indici delle risposte corrette (0=A, 1=B, 2=C, 3=D):
          Q1→B(1)  Q2→C(2)  Q3→A(0)  Q4→D(3)  Q5→B(1)  Q6→C(2)
          Pattern: 1,2,0,3,1,2 — variato, nessuna ripetizione di indici consecutivi.
        */
        const MODULE_ID = 3;
        const PASS_PCT = 70;

        const QUESTIONS = [
            {
                q: "La variabile 'score' di uno studente mostra sempre il valore 1 immediatamente all'avvio del programma, prima ancora che il giocatore abbia camminato. Qual è la causa precisa?",
                opts: [
                    "L'evento 'Al camminare del giocatore' si attiva automaticamente una volta all'inizializzazione del programma",
                    "Il blocco di inizializzazione 'imposta score = 0' si trova all'interno dell'evento 'Al camminare del giocatore', quindi ogni passo azzera il punteggio a 0 prima dell'incremento — facendo sì che lo score rimanga sempre a 1",
                    "Le variabili di MakeCode partono sempre da 1 a meno che non vengano impostate esplicitamente in un blocco 'Al via'",
                    "Il blocco 'cambia score di 1' è in esecuzione in un ciclo infinito in background"
                ],
                correct: 1,  // B
                feedback: "Corretto. Se 'imposta score = 0' viene posizionato all'interno dell'evento del camminare, la sequenza a ogni passo è: (1) imposta score a 0, (2) cambia score di 1 — il punteggio sarà sempre uguale a 1. La soluzione: sposta 'imposta score = 0' in un blocco 'Al via' in modo che venga eseguito una sola volta all'avvio del programma."
            },
            {
                q: "Uno studente vuole che la condizione di vittoria si attivi quando il giocatore ha raccolto 10 o più gemme, ma la condizione non si attiva mai nemmeno quando gems = 12. Il codice recita: se gems = 10 allora { say 'Hai Vinto!' }. Qual è il problema e come risolverlo?",
                opts: [
                    "La variabile deve chiamarsi obbligatoriamente 'score' e non 'gems' — MakeCode riconosce solo i nomi delle variabili predefiniti",
                    "Il blocco 'say' deve essere sostituito con un blocco 'print' all'interno dei condizionali",
                    "La condizione utilizza = (esattamente uguale a 10) invece di ≥ (maggiore o uguale a 10) — se il giocatore raccoglie 12 gemme, gems non sarà mai esattamente uguale a 10, quindi la condizione non sarà mai vera",
                    "I condizionali non possono leggere le variabili direttamente — è necessario aggiungere prima un blocco 'leggi' separato"
                ],
                correct: 2,  // C
                feedback: "Corretto. Con la condizione 'gems = 10', il programma controlla se gems è esattamente uguale a 10. Se il giocatore raccoglie le gemme in gruppi (es. +3 alla volta), gems salta da 9 a 12 — mancando completamente il 10. La condizione non sarà mai vera. Soluzione: cambia l'operatore in ≥ (maggiore o uguale a), che si attiverà quando gems raggiunge il valore 10 o qualsiasi valore superiore."
            },
            {
                q: "Quale delle seguenti opzioni descrive correttamente l'ambito (scope) delle variabili in MakeCode Education?",
                opts: [
                    "Tutte le variabili sono globali — qualsiasi blocco evento in qualunque punto del programma può leggere e modificare qualsiasi variabile",
                    "Le variabili sono locali rispetto al blocco evento in cui vengono create — gli altri blocchi non possono accedervi",
                    "Le variabili esistono solo mentre il blocco evento che le ha create è attivamente in esecuzione",
                    "Le variabili di MakeCode devono essere dichiarate con un tipo (numero, testo o booleano) prima di poter essere utilizzate"
                ],
                correct: 0,  // A
                feedback: "Corretto. In MakeCode Education, tutte le variabili sono globali per impostazione predefinita. Una variabile creata in un blocco 'Al via' è completamente accessibile e modificabile all'interno di 'Al camminare del giocatore', 'Al rompere di un blocco' e in tutti gli altri blocchi evento. Non esistono ambiti locali per le variabili. Questo semplifica la programmazione per i giovani studenti, ma richiede attenzione — qualsiasi evento può accidentalmente sovrascrivere una variabile."
            },
            {
                q: "Dopo aver raggiunto la condizione di vittoria (score ≥ 10), l'animazione dei fuochi d'artificio di uno studente si attiva a ogni singolo passo, non una volta sola. Qual è la causa tecnica più precisa?",
                opts: [
                    "Il blocco dei fuochi d'artificio ha un'impostazione di ripetizione interna impostata su 'infinito'",
                    "L'evento 'Al camminare del giocatore' presenta un bug di doppio avvio integrato che si attiva due volte per passo",
                    "L'operatore di confronto ≥ dovrebbe essere modificato in = per evitare che la condizione si riattivi",
                    "Il punteggio non viene resettato a 0 (o lo stato del gioco non viene modificato) all'interno del blocco della condizione di vittoria — score rimane ≥ 10 dopo la prima vittoria, quindi ogni passo di camminata successivo riattiva la condizione"
                ],
                correct: 3,  // D
                feedback: "Corretto. Dopo l'attivazione della vittoria, se score rimane a 10 (o superiore), ogni passo successivo valuterà 'se score ≥ 10' → vero → ripartono i fuochi d'artificio. Soluzione: aggiungi 'imposta score = 0' come ultima riga all'interno del blocco di vittoria (resetta per rigiocare), oppure introduci una variabile booleana 'gameActive' impostata su falso al momento della vittoria, racchiudendo poi l'intero blocco del camminare in 'se gameActive = vero'."
            },
            {
                q: "Un tutor vuole aiutare uno studente a evitare di posizionare il codice al di fuori del blocco evento. Quale tecnica pedagogica è più efficace prima che lo studente inizi a programmare?",
                opts: [
                    "Chiedere allo studente di guardare lo schermo del tutor mentre quest'ultimo crea il programma, per poi copiarlo",
                    "Chiedere allo studente di disegnare un rettangolo su un foglio di carta, contrassegnarlo con il nome del blocco evento e decidere fisicamente quali istruzioni inserire all'interno e quali lasciare fuori prima di toccare MakeCode",
                    "Fornire allo studente un programma pre-costruito da modificare anziché crearlo da zero",
                    "Dire allo studente di controllare la pagina della documentazione di MakeCode se non è sicuro del posizionamento dei blocchi"
                ],
                correct: 1,  // B
                feedback: "Corretto. La tecnica del 'disegno dei confini del blocco' esternalizza fisicamente il compito cognitivo del contenimento dei blocchi. Gli studenti che disegnano il rettangolo prima di programmare commettono l'errore dentro/fuori con frequenza significativamente minore, perché il confine diventa un concetto spaziale tangibile anziché una regola strutturale astratta. Inoltre, richiede allo studente di pianificare prima di programmare — un'abitudine professionale fondamentale."
            },
            {
                q: "Uno studente vuole che il suo programma mostri il testo 'Punteggio Attuale: 7' quando il giocatore cammina. Posiziona un blocco 'say' che contiene solo la variabile 'score'. L'output mostra '7' ma non il testo dell'etichetta. Come si può risolvere?",
                opts: [
                    "Aggiungere un secondo blocco 'say' separato che mostri solo il testo dell'etichetta; MakeCode li visualizzerà insieme",
                    "Utilizzare un blocco 'print' anziché 'say' — print supporta il testo combinato",
                    "Utilizzare un blocco 'unisci testo' per concatenare la stringa \"Punteggio Attuale: \" con la variabile score, passando poi il risultato unito a un singolo blocco 'say'",
                    "Le variabili non possono essere visualizzate in gioco usando 'say' — devono essere mostrate solo nella console di MakeCode"
                ],
                correct: 2,  // C
                feedback: "Corretto. Il blocco 'say' accetta un singolo valore. Per combinare testo e una variabile, gli studenti devono utilizzare il blocco 'unisci testo': [unisci [\"Punteggio Attuale: \"] [score]] → questo produce la stringa combinata unica \"Punteggio Attuale: 7\", che viene poi passata a 'say'. Due blocchi 'say' separati verrebbero visualizzati su linee separate, non combinati."
            }
        ];

        let current = 0, answers = [], answered = false;
        const LETTERS = ['A', 'B', 'C', 'D'];

        function renderQuestion() {
            const q = QUESTIONS[current];
            answered = false;
            document.getElementById('q-count').textContent = `${current} / ${QUESTIONS.length}`;
            document.getElementById('q-prog').style.width = `${current / QUESTIONS.length * 100}%`;
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('feedback-area').innerHTML = '';
            document.getElementById('question-area').innerHTML = `
        <div class="qnum">Domanda ${current + 1} di ${QUESTIONS.length}</div>
        <div class="qtext">${q.q}</div>
        <div class="opt-list" id="opt-list">
          ${q.opts.map((o, i) => `
            <div class="opt" id="opt-${i}" onclick="selectOpt(${i})">
              <span class="opt-letter">${LETTERS[i]}</span><span>${o}</span>
            </div>`).join('')}
        </div>`;
        }

        function selectOpt(i) {
            if (answered) return;
            answered = true;
            const q = QUESTIONS[current];
            answers[current] = i;
            for (let j = 0; j < q.opts.length; j++) {
                const el = document.getElementById(`opt-${j}`);
                el.classList.add('disabled');
                if (j === q.correct) el.classList.add('correct');
                else if (j === i) el.classList.add('wrong');
            }
            const isRight = i === q.correct;
            document.getElementById('feedback-area').innerHTML = `
        <div class="feedback-box ${isRight ? 'ok' : 'bad'} show">
          ${isRight ? '✅ ' : '❌ '} ${q.feedback}
        </div>`;
            if (current < QUESTIONS.length - 1) document.getElementById('next-btn').style.display = 'inline-flex';
            else document.getElementById('submit-btn').style.display = 'inline-flex';
        }

        function nextQuestion() { current++; renderQuestion(); window.scrollTo(0, 0); }

        function submitQuiz() {
            const score = answers.filter((a, i) => a === QUESTIONS[i].correct).length;
            const pct = Math.round(score / QUESTIONS.length * 100);
            const passed = pct >= PASS_PCT;
            if (passed) { const prev = getModuleScore(MODULE_ID); if (!prev || pct > prev) markModulePassed(MODULE_ID, pct); }
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('results-screen').style.display = 'block';
            document.getElementById('result-card').innerHTML = `
        <div class="result-emoji">${passed ? '🎉' : '😅'}</div>
        <div class="result-title">${passed ? 'Modulo 3 Completato!' : 'Non ci sei ancora'}</div>
        <div class="result-pct ${passed ? 'pass' : 'fail'}">${pct}%</div>
        <div class="result-sub">Hai risposto correttamente a <strong>${score} su ${QUESTIONS.length}</strong> domande.
          ${passed ? ' Eccellente — Modulo 3 completato!'
                    : ` È richiesto un punteggio del <strong>${PASS_PCT}%</strong>. Rivedi il materiale e riprova.`}
        </div>`;
            document.getElementById('result-actions').innerHTML = passed
                ? `<a href="ItModule4.html" class="btn-primary">Continua al Modulo 4 →</a>
           <button class="btn-outline" onclick="goHome()">← Dashboard</button>`
                : `<button class="btn-primary" onclick="retake()">Ripeti il Test</button>
           <a href="ItModule3.html" class="btn-outline">← Rivedi il Modulo 3</a>`;
            window.scrollTo(0, 0);
        }

        function retake() {
            current = 0; answers = [];
            document.getElementById('quiz-screen').style.display = 'block';
            document.getElementById('results-screen').style.display = 'none';
            renderQuestion(); window.scrollTo(0, 0);
        }

        initShared();
        if (!isModuleUnlocked(MODULE_ID)) { alert('Per favore, completa prima i moduli precedenti.'); goHome(); }
        document.getElementById('top-progress').style.width = `${getOverallProgress() / 5 * 100}%`;
        renderQuestion();
    </script>
</body>
</html>
