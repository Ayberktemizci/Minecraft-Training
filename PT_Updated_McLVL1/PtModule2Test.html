<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste do Módulo 2 — Cidade de Luz | Kodland</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        .quiz-header {
            background: linear-gradient(135deg,#1D4ED8,#3B82F6);
            padding: 24px 32px;
            color: #fff;
            text-align: center
        }

            .quiz-header h2 {
                font-family: 'Nunito',sans-serif;
                font-size: 22px;
                font-weight: 900;
                color: #fff;
                margin-bottom: 4px
            }

            .quiz-header p {
                color: rgba(255,255,255,.8);
                font-size: 13px
            }

        .feedback-box {
            display: none;
            margin-top: 14px;
            border-radius: var(--rsm);
            padding: 13px 16px;
            font-size: 13.5px;
            line-height: 1.6;
            border: 2px solid
        }

            .feedback-box.show {
                display: block
            }

            .feedback-box.ok {
                background: var(--ok-bg);
                border-color: var(--ok-b);
                color: var(--ok-t)
            }

            .feedback-box.bad {
                background: var(--no-bg);
                border-color: var(--no-b);
                color: var(--no-t)
            }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-logo" onclick="goHome()" style="cursor:pointer">
            <span class="logo-mark">Kodland</span><div class="logo-div"></div>
            <span class="logo-sub">Treinamento de Tutores</span>
        </div>
        <div class="nav-r">
            <button class="nav-back" onclick="history.back()">← Módulo 2</button>
            <button class="icon-btn" id="theme-toggle">🌙</button>
        </div>
    </nav>
    <div class="progress-strip"><div class="progress-fill" id="top-progress" style="width:0%"></div></div>

    <div class="quiz-header">
        <h2>📝 Verificação de Conhecimento do Módulo 2</h2>
        <p>🏙️ Cidade de Luz · 6 Perguntas · 70% para Aprovação</p>
    </div>

    <div id="quiz-screen" class="quiz-wrap">
        <div class="q-progress">
            <div class="q-prog-track"><div class="q-prog-fill" id="q-prog" style="width:0%"></div></div>
            <span class="q-count" id="q-count">0 / 6</span>
        </div>
        <div id="question-area"></div>
        <div id="feedback-area"></div>
        <div class="btn-row" style="margin-top:16px">
            <button class="btn-primary" id="next-btn" onclick="nextQuestion()" style="display:none">Próxima Questão →</button>
            <button class="btn-primary" id="submit-btn" onclick="submitQuiz()" style="display:none">Enviar Respostas</button>
        </div>
    </div>

    <div id="results-screen" style="display:none;padding:40px 24px">
        <div class="result-card" id="result-card"></div>
        <div class="btn-row center" style="margin-top:20px" id="result-actions"></div>
    </div>

    <footer>© 2026 Kodland. Material de treinamento interno de tutores.</footer>
    <script src="shared.js"></script>
    <script>
        /*
          MÓDULO 2 — 6 QUESTÕES ÚNICAS (zero sobreposição com o Módulo 1 ou DST)
          Índices de respostas corretas (0=A, 1=B, 2=C, 3=D):
          Q1→D(3)  Q2→A(0)  Q3→C(2)  Q4→B(1)  Q5→D(3)  Q6→A(0)
          Padrão: 3,0,2,1,3,0 — variado, sem repetições consecutivas.
        */
        const MODULE_ID = 2;
        const PASS_PCT = 70;

        const QUESTIONS = [
            {
                q: "Um aluno executa /clone 100 64 200  104 68 204  100 64 200 e nada acontece. Qual é a causa e a solução correta?",
                opts: [
                    "O destino está muito longe — o /clone tem um alcance máximo de 10 blocos",
                    "A coordenada Y do destino deve ser sempre 0",
                    "O comando foi digitado corretamente — o clone sempre aparece após um atraso de 5 segundos",
                    "As regiões de origem e destino se sobrepõem — as coordenadas de destino devem estar fora da caixa delimitadora de origem"
                ],
                correct: 3,  // D
                feedback: "Correto. O destino do /clone [100 64 200] é idêntico ao primeiro canto da origem — as regiões se sobrepõem completamente, causando uma falha silenciosa. O destino deve ser um par de coordenadas que fique totalmente fora da caixa delimitadora de origem (por exemplo, /clone 100 64 200  104 68 204  120 64 200)."
            },
            {
                q: "Um aluno digita /tp @s ~0 64 ~0. O que esse comando faz de diferente tanto de /tp @s ~0 ~0 ~0 quanto de /tp @s 0 64 0?",
                opts: [
                    "Ele mantém as posições X e Z atuais do aluno, mas define sua altitude para exatamente Y=64, combinando um valor absoluto com dois deslocamentos relativos",
                    "Ele teletransporta o aluno para a origem do mundo exatamente no nível do mar",
                    "Ele teletransporta todos os jogadores (~0) para o andar 64 — @s é o seletor para todos os alunos",
                    "É uma sintaxe inválida — você não pode misturar valores com til e absolutos em um único comando /tp"
                ],
                correct: 0,  // A
                feedback: "Correto. O Minecraft permite sintaxe de coordenadas mistas. ~0 mantém o X atual inalterado; 64 (sem til) define a altitude exatamente para Y=64; ~0 mantém o Z atual inalterado. Isso é útil para comandos de 'ajustar ao nível do mar' sem alterar a posição horizontal. O comando /tp @s ~0 ~0 ~0 não move o jogador; /tp @s 0 64 0 o envia para a origem do mundo."
            },
            {
                q: "A grade da Bancada de Trabalho tem 9 slots. Um aluno coloca dois blocos de Pedra lado a lado na linha superior da Bancada de Trabalho e não obtém nada. Qual é o problema?",
                opts: [
                    "Placas de Pressão de Pedra requerem três blocos de Pedra, não dois",
                    "A Bancada de Trabalho deve ser colocada no chão antes que as receitas funcionem",
                    "A receita da Placa de Pressão de Pedra requer dois blocos de Pedra colocados em um padrão horizontal 1×2 em qualquer linha — o aluno provavelmente os colocou nos slots 1 and 3 em vez de 1 e 2 (adjacentes), pulando o slot do meio",
                    "A Pedra não pode ser usada na Bancada de Trabalho — ela requer Pedregulho"
                ],
                correct: 2,  // C
                feedback: "Correto. A receita da Placa de Pressão de Pedra requer dois blocos de Pedra em slots adjacentes horizontalmente (em qualquer linha). Se o aluno pulou o slot do meio — colocando a Pedra nas posições 1 e 3 em vez de 1 e 2 —, o padrão da grade não corresponde a nenhuma receita e nada é produzido. As receitas de fabricação são estritamente posicionais."
            },
            {
                q: "Durante a construção cooperativa da cidade, um aluno destrói acidentalmente 10 blocks da ponte de outra equipe. De acordo com a estrutura das Regras de Vizinhança, qual é a resposta correta do tutor?",
                opts: [
                    "Remover o aluno da sessão temporariamente como uma consequência clara pela violação",
                    "Fazer referência à Regra de Vizinhança pelo nome, guiar o aluno para ajudar a reconstruir os blocos danificados e usar o momento para reforçar os padrões comunitários sem linguagem punitiva",
                    "Ignorar, a menos que o aluno afetado reclame, para evitar piorar a situação",
                    "Pausar a sessão inteira e resetar o mundo para antes do dano ocorrer"
                ],
                correct: 1,  // B
                feedback: "Correto. Respostas punitivas (remoção, pausa na sessão) geram ressentimento e definem um tom temeroso em sala de aula. A estrutura das Regras de Vizinhança é restaurativa, não punitiva: nomeie a regra ('Lembre-se — Regra de Vizinhança'), guie o aluno para reconstruir o que foi quebrado e use isso como um momento de padrões comunitários. Isso modela as normas colaborativas do mundo real que a atividade de construção de cidades foi projetada para praticar."
            },
            {
                q: "Uma armadilha de Placa de Pressão está conectada a um Ejetor a 20 blocos de distância. Um aluno pisa na placa, mas o Ejetor dispara com um atraso perceptível de 1 segundo. Qual é a causa técnica?",
                opts: [
                    "O Ejetor precisa de um Repetidor de Redstone ao lado dele para disparar na velocidade normal",
                    "Há uma lacuna no fio de Redstone que está atrasando o sinal",
                    "A Placa de Pressão só é ativada no segundo passo, não no primeiro",
                    "Os sinais de Redstone viajam a 1 bloco por tick (0,05 segundos); ao longo de 20 blocos de pó, o sinal leva 20 ticks = 1 segundo para chegar ao Ejetor — este é o comportamento físico esperado, não um bug"
                ],
                correct: 3,  // D
                feedback: "Correto. A velocidade de propagação do sinal de Redstone é de 1 bloco por tick, e um tick equivale a 0,05 segundos. Portanto, um fio de 20 blocos introduz um atraso de 20 ticks = 1 segundo. Isso é a física normal do Minecraft. Se for necessária uma resposta mais rápida, encurte o fio ou use um Comparador de Redstone para amplificar sem atraso. Importante: esta é uma oportunidade de ensino sobre a propagação de sinal, não um erro para 'corrigir'."
            },
            {
                q: "Após a sessão cooperativa de hoje, um tutor deseja dar um elogio específico e conectado ao comportamento para a equipe dos Construtores de Pontes. Qual das alternativas a seguir é o exemplo mais eficaz?",
                opts: [
                    "\"Trabalho excepcional, Construtores de Pontes — vocês usaram coordenadas exatas para alinhar as extremidades da ponte com os distritos de ambas as equipes, and seu design do arco mostra que vocês pensaram na simetria. Isso é pensamento arquitetônico profissional.\"",
                    "\"Ótimo trabalho hoje, equipe — vocês construíram uma ponte muito bonita!\"",
                    "\"Os Construtores de Pontes foram a melhor equipe hoje — muito melhores que os outros.\"",
                    "\"Vocês foram bem. Darei uma tarefa bônus na próxima vez como recompensa.\""
                ],
                correct: 0,  // A
                feedback: "Correto. A alternativa A é específica e conectada ao comportamento: nomeia a ação técnica exata ('usaram coordenadas exatas para alinhar as extremidades'), o princípio de design aplicado ('simetria') e enquadra em termos profissionais ('pensamento arquitetônico'). Isso dá aos alunos informações claras sobre qual comportamento repetir. Elogios genéricos ('bela ponte!'), elogios comparativos ('melhor equipe') e recompensas adiadas não criam o mesmo loop de reforço."
            }
        ];

        let current = 0, answers = [], answered = false;
        const LETTERS = ['A', 'B', 'C', 'D'];

        function renderQuestion() {
            const q = QUESTIONS[current];
            answered = false;
            document.getElementById('q-count').textContent = `${current} / ${QUESTIONS.length}`;
            document.getElementById('q-prog').style.width = `${current / QUESTIONS.length * 100}%`;
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('feedback-area').innerHTML = '';
            document.getElementById('question-area').innerHTML = `
            <div class="qnum">Questão ${current + 1} de ${QUESTIONS.length}</div>
            <div class="qtext">${q.q}</div>
            <div class="opt-list" id="opt-list">
              ${q.opts.map((o, i) => `
                <div class="opt" id="opt-${i}" onclick="selectOpt(${i})">
                  <span class="opt-letter">${LETTERS[i]}</span><span>${o}</span>
                </div>`).join('')}
            </div>`;
        }

        function selectOpt(i) {
            if (answered) return;
            answered = true;
            const q = QUESTIONS[current];
            answers[current] = i;
            for (let j = 0; j < q.opts.length; j++) {
                const el = document.getElementById(`opt-${j}`);
                el.classList.add('disabled');
                if (j === q.correct) el.classList.add('correct');
                else if (j === i) el.classList.add('wrong');
            }
            const isRight = i === q.correct;
            document.getElementById('feedback-area').innerHTML = `
            <div class="feedback-box ${isRight ? 'ok' : 'bad'} show">
              ${isRight ? '✅ ' : '❌ '} ${q.feedback}
            </div>`;
            if (current < QUESTIONS.length - 1) document.getElementById('next-btn').style.display = 'inline-flex';
            else document.getElementById('submit-btn').style.display = 'inline-flex';
        }

        function nextQuestion() { current++; renderQuestion(); window.scrollTo(0, 0); }

        function submitQuiz() {
            const score = answers.filter((a, i) => a === QUESTIONS[i].correct).length;
            const pct = Math.round(score / QUESTIONS.length * 100);
            const passed = pct >= PASS_PCT;
            if (passed) { const prev = getModuleScore(MODULE_ID); if (!prev || pct > prev) markModulePassed(MODULE_ID, pct); }
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('results-screen').style.display = 'block';
            document.getElementById('result-card').innerHTML = `
            <div class="result-emoji">${passed ? '🎉' : '😅'}</div>
            <div class="result-title">${passed ? 'Módulo 2 Concluído!' : 'Não Foi Dessa Vez'}</div>
            <div class="result-pct ${passed ? 'pass' : 'fail'}">${pct}%</div>
            <div class="result-sub">Você respondeu corretamente a <strong>${score} de ${QUESTIONS.length}</strong> questões.
              ${passed ? ' Excelente trabalho — você demonstrou sólida compreensão do conteúdo do Módulo 2.'
                    : ` Uma pontuação de <strong>${PASS_PCT}%</strong> é necessária para desbloquear o Módulo 3. Revise o material e tente novamente.`}
            </div>`;
            document.getElementById('result-actions').innerHTML = passed
                ? `<a href="PtModule3.html" class="btn-primary">Continuar para o Módulo 3 →</a>
               <button class="btn-outline" onclick="goHome()">← Painel</button>`
                : `<button class="btn-primary" onclick="retake()">Refazer Teste</button>
               <a href="PtModule2.html" class="btn-outline">← Revisar Módulo 2</a>`;
            window.scrollTo(0, 0);
        }

        function retake() {
            current = 0; answers = [];
            document.getElementById('quiz-screen').style.display = 'block';
            document.getElementById('results-screen').style.display = 'none';
            renderQuestion(); window.scrollTo(0, 0);
        }

        initShared();
        if (!isModuleUnlocked(MODULE_ID)) { alert('Por favor, conclua o Módulo 1 primeiro.'); goHome(); }
        document.getElementById('top-progress').style.width = `${getOverallProgress() / 5 * 100}%`;
        renderQuestion();
    </script>
</body>
</html>
