<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen del Módulo 4 — Bosque Mecánico | Kodland</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        .quiz-header {
            background: linear-gradient(135deg,#B45309,#F59E0B);
            padding: 24px 32px;
            color: #fff;
            text-align: center
        }

            .quiz-header h2 {
                font-family: 'Nunito',sans-serif;
                font-size: 22px;
                font-weight: 900;
                color: #fff;
                margin-bottom: 4px
            }

            .quiz-header p {
                color: rgba(255,255,255,.85);
                font-size: 13px
            }

        .feedback-box {
            display: none;
            margin-top: 14px;
            border-radius: var(--rsm);
            padding: 13px 16px;
            font-size: 13.5px;
            line-height: 1.6;
            border: 2px solid
        }

            .feedback-box.show {
                display: block
            }

            .feedback-box.ok {
                background: var(--ok-bg);
                border-color: var(--ok-b);
                color: var(--ok-t)
            }

            .feedback-box.bad {
                background: var(--no-bg);
                border-color: var(--no-b);
                color: var(--no-t)
            }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-logo" onclick="goHome()" style="cursor:pointer">
            <span class="logo-mark">Kodland</span><div class="logo-div"></div>
            <span class="logo-sub">Formación de Tutores</span>
        </div>
        <div class="nav-r">
            <button class="nav-back" onclick="history.back()">← Módulo 4</button>
            <button class="icon-btn" id="theme-toggle">🌙</button>
        </div>
    </nav>
    <div class="progress-strip"><div class="progress-fill" id="top-progress" style="width:0%"></div></div>

    <div class="quiz-header">
        <h2>📝 Verificación de Conocimientos Módulo 4</h2>
        <p>🌲 Bosque Mecánico · 6 Preguntas · 70% para Aprobar</p>
    </div>

    <div id="quiz-screen" class="quiz-wrap">
        <div class="q-progress">
            <div class="q-prog-track"><div class="q-prog-fill" id="q-prog" style="width:0%"></div></div>
            <span class="q-count" id="q-count">0 / 6</span>
        </div>
        <div id="question-area"></div>
        <div id="feedback-area"></div>
        <div class="btn-row" style="margin-top:16px">
            <button class="btn-primary" id="next-btn" onclick="nextQuestion()" style="display:none">Siguiente Pregunta →</button>
            <button class="btn-primary" id="submit-btn" onclick="submitQuiz()" style="display:none">Enviar Respuestas</button>
        </div>
    </div>

    <div id="results-screen" style="display:none;padding:40px 24px">
        <div class="result-card" id="result-card"></div>
        <div class="btn-row center" style="margin-top:20px" id="result-actions"></div>
    </div>

    <footer>© 2026 Kodland. Material de capacitación interna para tutores.</footer>
    <script src="shared.js"></script>
    <script>
        /*
          MÓDULO 4 — 6 PREGUNTAS ÚNICAS (sin duplicación con los Módulos 1-3 o el DST)
          Índices de respuestas correctas (0=A, 1=B, 2=C, 3=D):
          Q1→C(2)  Q2→A(0)  Q3→D(3)  Q4→B(1)  Q5→C(2)  Q6→A(0)
          Patrón: 2,0,3,1,2,0 — variado, sin repeticiones consecutivas.
        */
        const MODULE_ID = 4;
        const PASS_PCT = 70;

        const QUESTIONS = [
            {
                q: "Un estudiante programa al Agente para sembrar una cuadrícula de 5×5 usando bucles anidados, pero el resultado es una franja diagonal de semillas en lugar de una cuadrícula. Después de que el bucle interno completa la fila 1 y el código del bucle externo ejecuta 'mover agente a la derecha 1', el Agente luego ejecuta 'mover agente atrás 5'. ¿Qué está mal en esta secuencia?",
                opts: [
                    "El bucle externo debería ejecutarse 5 veces para coincidir con el interno; ambos deben tener conteos idénticos",
                    "'Mover agente a la derecha 1' y 'mover agente atrás 5' deberían reemplazarse por un único comando 'agent tp'",
                    "Después de completar la fila 1 moviéndose hacia adelante, el Agente se ha movido 5 bloques al frente. 'Mover atrás 5' lo regresa al inicio de la columna original. Pero también falta 'dar la vuelta'; sin invertir la dirección, la fila 2 comienza sembrando la fila 1 en la dirección opuesta, no en una fila adyacente",
                    "El conteo del bucle interno es demasiado alto; reducirlo a 4 solucionará el patrón diagonal"
                ],
                correct: 2,  // C
                feedback: "Correcto. Después de la fila 1, el Agente está 5 bloques adelante y debe regresar a la columna inicial. 'Mover atrás 5' lo devuelve correctamente. Pero sin 'dar la vuelta' (dos giros a la derecha o equivalente), el Agente mira en la misma dirección que la fila 1 cuando comienza la fila 2; luego siembra la fila 2 comenzando desde la posición original en la misma dirección, creando un patrón diagonal o superpuesto. La secuencia correcta: terminar la fila → mover a la derecha 1 (cambiar a la siguiente fila) → dar la vuelta → mover atrás 0 (ya en el inicio de la fila 2) y sembrar."
            },
            {
                q: "¿Cuál es la condición previa crítica que debe cumplirse antes de que el comando del Agente 'colocar al mover abajo' siembre con éxito los cultivos en lugar de soltar las semillas como objetos sueltos?",
                opts: [
                    "El suelo directamente debajo del Agente debe ser tierra de cultivo arada (creada al usar una Azada en tierra o césped) que también esté hidratada; a menos de 4 bloques de una fuente de agua",
                    "El Agente debe tener al menos 32 semillas en su inventario antes de que comience el bucle de siembra",
                    "El jugador debe estar en el mismo fragmento (chunk) que el Agente para que se ejecute el comando de siembra",
                    "La tierra de cultivo debe estar exactamente en Y=63; sembrar en cualquier otra altitud hace que las semillas se caigan"
                ],
                correct: 0,  // A
                feedback: "Correcto. Se deben cumplir ambas condiciones: (1) el suelo debe ser tierra de cultivo arada (usa una Azada en la tierra o el césped para convertirlo). (2) La tierra de cultivo debe estar hidratada: debe haber un bloque de origen de agua a menos de 4 bloques (horizontalmente) de la tierra de cultivo. La tierra de cultivo seca (color ocre claro) volverá a ser tierra normal y expulsará cualquier cultivo colocado en ella. La tierra de cultivo hidratada (marrón oscuro) retiene los cultivos sembrados y permite su crecimiento."
            },
            {
                q: "La Tolva de un estudiante está posicionada directamente debajo de la zona de caída de la granja y es visible en el mundo, pero los elementos cosechados se acumulan en el suelo y nunca se recolectan. Después de 5 minutos, los objetos desaparecen. ¿Cuál es la causa más probable?",
                opts: [
                    "El inventario de 5 ranuras de la Tolva está completamente lleno con objetos de filtro; no quedan ranuras vacías para nuevos elementos",
                    "El Pistón que rompe los cultivos está demasiado alto; los objetos deben caer exactamente 1 bloque dentro de la Tolva",
                    "La salida de la Tolva está bloqueada: se ha conectado a un cofre que ya está lleno, por lo que la Tolva no puede transferir elementos y se satura, impidiendo la entrada de nuevos objetos",
                    "Las Tolvas no pueden recolectar objetos que caigan más de 3 bloques; la Tolva debe elevarse a menos de 3 bloques de la capa del cultivo"
                ],
                correct: 3,  // D
                feedback: "Correcto. Cuando el cofre de salida de una Tolva está completamente lleno, la Tolva no puede transferir más elementos fuera de su propio inventario de 5 ranuras. Una vez que esas 5 ranuras se llenan, la Tolva deja de recolectar objetos desde arriba; los elementos caen sobre la cara superior de la Tolva, pero la succión está bloqueada porque su espacio interno está al máximo de su capacidad. Solución: expandir el almacenamiento (añadir más cofres en cadena) o separar los cultivos de las semillas usando una etapa de clasificación para que la producción nunca llene un solo cofre por completo."
            },
            {
                q: "El protocolo de depuración 'probar en aislamiento' para el Módulo 4 recomienda probar cada etapa de la tubería por separado antes de la integración. ¿En qué orden se deben probar las etapas?",
                opts: [
                    "Almacenar primero, luego Recolectar, luego Activar, luego Detectar; probar hacia atrás desde la salida hasta la entrada",
                    "Detectar primero (el Observador se activa al crecer el cultivo usando una Lámpara), luego Activar (el Pistón se despliega desde una Palanca), luego Recolectar (la Tolva recoge objetos tirados a mano), luego Almacenar (la Tolva los envía al cofre); probar cada etapa de forma independiente antes de conectar",
                    "Construir y probar las cuatro etapas simultáneamente; las pruebas en aislamiento desperdician tiempo en una sesión de 60 minutos",
                    "Activar primero, luego Detectar, luego Almacenar, luego Recolectar; probar la etapa más compleja antes de las más sencillas"
                ],
                correct: 1,  // B
                feedback: "Correcto. El protocolo de aislamiento sigue el orden del flujo de datos: (1) Detectar — confirma que el Observador se activa cuando los cultivos crecen (prueba usando una Lámpara de Redstone como indicador). (2) Activar — confirma que el Pistón se despliega cuando recibe energía (prueba con una Palanca manual, no con el Observador). (3) Recolectar — confirma que la Tolva succiona objetos (tira elementos con la mano sobre ella). (4) Almacenar — confirma que la Tolva los envía al cofre correcto (verifica con un solo objeto). Una vez que las cuatro etapas pasen la prueba de forma independiente, conéctalas. Esto previene fallas compuestas que son difíciles de diagnosticar."
            },
            {
                q: "¿Qué marco de lenguaje debe utilizar un tutor al explicar el circuito automatizado de cosecha de cultivos a niños de 8 años, con el fin de conectar los conceptos de programación condicional del Módulo 3 con el hardware de Redstone del Módulo 4?",
                opts: [
                    "Notación de diagramas de circuitos, utilizando símbolos electrónicos estándar para interruptores, sensores y actuadores",
                    "Teoría matemática de conjuntos: 'el evento de cosecha es un miembro del conjunto de eventos de cambio de estado de crecimiento'",
                    "Lenguaje Si–Entonces: 'SI el trigo alcanza la etapa de crecimiento 7 (madurez total), ENTONCES el Observador se activa, ENTONCES el Pistón rompe los cultivos, ENTONCES los objetos caen'; describiendo el comportamiento del hardware usando el mismo marco condicional que los estudiantes conocen del Módulo 3",
                    "Únicamente lenguaje de diagramas de flujo: dibujar la tubería en un pizarrón antes de construir cualquier bloque"
                ],
                correct: 2,  // C
                feedback: "Correcto. El uso del lenguaje Si–Entonces es el puente pedagógico deliberado entre los Módulos 3 y 4. Los estudiantes ya comprenden 'si condición entonces acción' a partir de los condicionales de MakeCode. Al describir el circuito de cosecha de Redstone con el mismo lenguaje ('SI el trigo está maduro, ENTONCES el Observador se activa, ENTONCES el Pistón se despliega'), el tutor hace que el circuito de hardware se sienta como una lógica familiar en lugar de un concepto completamente nuevo. Esto reduce drásticamente la carga cognitiva y ayuda a los estudiantes a mapear mentalmente los conceptos de software del Módulo 3 en el hardware del Módulo 4."
            },
            {
                q: "Un estudiante ha construido con éxito una granja de bambú de una sola fila en el Módulo 1. En el Módulo 4, desea mejorarla para convertirla en una granja automatizada de múltiples filas y cultivos. ¿Qué nuevo concepto del Módulo 4 permite específicamente al Agente sembrar múltiples filas sin que el estudiante tenga que reposicionarlo manualmente entre ellas?",
                opts: [
                    "Bucles anidados: un bucle externo itera sobre las filas mientras que un bucle interno maneja la siembra de columnas dentro de cada fila, con código de reposicionamiento entre las iteraciones del bucle externo",
                    "El comando /clone del Módulo 2: duplicar el circuito de una sola fila para crear múltiples filas",
                    "El evento 'Al romper un bloque' del Módulo 3: activar la resiembra automáticamente cuando se cosechan los cultivos",
                    "Repetidores de Redstone: añadir retrasos de tiempo entre la secuencia de siembra de cada fila"
                ],
                correct: 0,  // A
                feedback: "Correcto. Los bucles anidados son el concepto del Módulo 4 que habilita la siembra automatizada de múltiples filas. El bucle externo (repetir 5) itera sobre las filas; el bucle interno (repetir 5) siembra las semillas dentro de cada fila. Entre las iteraciones del bucle externo, el código de reposicionamiento (mover a la derecha 1, dar la vuelta) desplaza al Agente al inicio de la siguiente fila. Este es el primer encuentro del estudiante con la iteración anidada, un patrón de programación fundamental que prefigura directamente el recorrido de matrices bidimensionales en una educación de programación más avanzada."
            }
        ];

        let current = 0, answers = [], answered = false;
        const LETTERS = ['A', 'B', 'C', 'D'];

        function renderQuestion() {
            const q = QUESTIONS[current];
            answered = false;
            document.getElementById('q-count').textContent = `${current} / ${QUESTIONS.length}`;
            document.getElementById('q-prog').style.width = `${current / QUESTIONS.length * 100}%`;
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('feedback-area').innerHTML = '';
            document.getElementById('question-area').innerHTML = `
        <div class="qnum">Pregunta ${current + 1} de ${QUESTIONS.length}</div>
        <div class="qtext">${q.q}</div>
        <div class="opt-list" id="opt-list">
          ${q.opts.map((o, i) => `
            <div class="opt" id="opt-${i}" onclick="selectOpt(${i})">
              <span class="opt-letter">${LETTERS[i]}</span><span>${o}</span>
            </div>`).join('')}
        </div>`;
        }

        function selectOpt(i) {
            if (answered) return;
            answered = true;
            const q = QUESTIONS[current];
            answers[current] = i;
            for (let j = 0; j < q.opts.length; j++) {
                const el = document.getElementById(`opt-${j}`);
                el.classList.add('disabled');
                if (j === q.correct) el.classList.add('correct');
                else if (j === i) el.classList.add('wrong');
            }
            const isRight = i === q.correct;
            document.getElementById('feedback-area').innerHTML = `
        <div class="feedback-box ${isRight ? 'ok' : 'bad'} show">
          ${isRight ? '✅ ' : '❌ '} ${q.feedback}
        </div>`;
            if (current < QUESTIONS.length - 1) document.getElementById('next-btn').style.display = 'inline-flex';
            else document.getElementById('submit-btn').style.display = 'inline-flex';
        }

        function nextQuestion() { current++; renderQuestion(); window.scrollTo(0, 0); }

        function submitQuiz() {
            const score = answers.filter((a, i) => a === QUESTIONS[i].correct).length;
            const pct = Math.round(score / QUESTIONS.length * 100);
            const passed = pct >= PASS_PCT;
            if (passed) { const prev = getModuleScore(MODULE_ID); if (!prev || pct > prev) markModulePassed(MODULE_ID, pct); }
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('results-screen').style.display = 'block';
            document.getElementById('result-card').innerHTML = `
        <div class="result-emoji">${passed ? '🎉' : '😅'}</div>
        <div class="result-title">${passed ? '¡Módulo 4 Completado!' : 'Aún no estás listo'}</div>
        <div class="result-pct ${passed ? 'pass' : 'fail'}">${pct}%</div>
        <div class="result-sub">Respondiste correctamente <strong>${score} de ${QUESTIONS.length}</strong>.
          ${passed ? ' ¡Excelente — Módulo 4 completado! Ahora puedes acceder al Módulo 5.'
                    : ` Se requiere una puntuación del <strong>${PASS_PCT}%</strong>. Revisa el Módulo 4 e inténtalo de nuevo.`}
        </div>`;
            document.getElementById('result-actions').innerHTML = passed
                ? `<a href="EsModule5.html" class="btn-primary">Continuar al Módulo 5 →</a>
           <button class="btn-outline" onclick="goHome()">← Panel Principal</button>`
                : `<button class="btn-primary" onclick="retake()">Repetir Examen</button>
           <a href="EsModule4.html" class="btn-outline">← Revisar Módulo 4</a>`;
            window.scrollTo(0, 0);
        }

        function retake() {
            current = 0; answers = [];
            document.getElementById('quiz-screen').style.display = 'block';
            document.getElementById('results-screen').style.display = 'none';
            renderQuestion(); window.scrollTo(0, 0);
        }

        initShared();
        if (!isModuleUnlocked(MODULE_ID)) { alert('Por favor, completa los módulos anteriores primero.'); goHome(); }
        document.getElementById('top-progress').style.width = `${getOverallProgress() / 5 * 100}%`;
        renderQuestion();
    </script>
</body>
</html>
