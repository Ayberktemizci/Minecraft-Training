<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificação de Conhecimento do Módulo 5 — Castelo do Criador | Kodland</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        .quiz-header {
            background: linear-gradient(135deg,#7E22CE,#EC4899);
            padding: 24px 32px;
            color: #fff;
            text-align: center;
        }

            .quiz-header h2 {
                font-family: 'Nunito',sans-serif;
                font-size: 22px;
                font-weight: 900;
                color: #fff;
                margin-bottom: 4px;
            }

            .quiz-header p {
                color: rgba(255,255,255,.85);
                font-size: 13px;
            }

        .feedback-box {
            display: none;
            margin-top: 14px;
            border-radius: var(--rsm);
            padding: 13px 16px;
            font-size: 13.5px;
            line-height: 1.6;
            border: 2px solid;
        }

            .feedback-box.show {
                display: block;
            }

            .feedback-box.ok {
                background: var(--ok-bg);
                border-color: var(--ok-b);
                color: var(--ok-t);
            }

            .feedback-box.bad {
                background: var(--no-bg);
                border-color: var(--no-b);
                color: var(--no-t);
            }

        /* ── Resultado de aprovação — cartão de próxima etapa ── */
        .next-step-card {
            margin-top: 18px;
            background: linear-gradient(135deg,#0e1f0a,#2f5a1e);
            border: 2px solid rgba(196,240,70,.3);
            border-radius: var(--r);
            padding: 22px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

            .next-step-card::before {
                content: '';
                position: absolute;
                inset: 0;
                background: radial-gradient(ellipse 60% 50% at 50% 0%,rgba(196,240,70,.1) 0%,transparent 75%);
                pointer-events: none;
            }

            .next-step-card h4 {
                font-family: 'Nunito',sans-serif;
                font-size: 16px;
                font-weight: 900;
                color: #fff;
                margin-bottom: 6px;
                position: relative;
            }

            .next-step-card p {
                font-size: 13px;
                color: rgba(255,255,255,.68);
                line-height: 1.55;
                margin-bottom: 14px;
                position: relative;
                max-width: 440px;
                margin-left: auto;
                margin-right: auto;
            }

            .next-step-card .btn-row {
                justify-content: center;
                position: relative;
            }

        .btn-library-cta {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: var(--rpill);
            background: var(--lime);
            color: var(--ink);
            font-family: 'Nunito',sans-serif;
            font-size: 14px;
            font-weight: 900;
            border: 2px solid var(--lime-d);
            text-decoration: none;
            transition: all .15s;
            letter-spacing: .2px;
        }

            .btn-library-cta:hover {
                background: var(--lime-d);
                transform: translateY(-2px);
                box-shadow: 0 6px 20px rgba(196,240,70,.35);
            }

        .btn-skip-dst {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: var(--rpill);
            background: rgba(255,255,255,.08);
            color: rgba(255,255,255,.7);
            font-family: 'Nunito',sans-serif;
            font-size: 12px;
            font-weight: 700;
            border: 2px solid rgba(255,255,255,.18);
            text-decoration: none;
            transition: all .15s;
        }

            .btn-skip-dst:hover {
                background: rgba(255,255,255,.18);
                color: #fff;
            }
    </style>
</head>
<body>

    <nav class="nav">
        <div class="nav-logo" onclick="goHome()" style="cursor:pointer">
            <span class="logo-mark">Kodland</span><div class="logo-div"></div>
            <span class="logo-sub">Treinamento de Tutores</span>
        </div>
        <div class="nav-r">
            <button class="nav-back" onclick="history.back()">← Módulo 5</button>
            <button class="icon-btn" id="theme-toggle">🌙</button>
        </div>
    </nav>
    <div class="progress-strip"><div class="progress-fill" id="top-progress" style="width:0%"></div></div>

    <div class="quiz-header">
        <h2>📝 Verificação de Conhecimento do Módulo 5</h2>
        <p>Castelo do Criador · 6 Questões · 70% para Aprovação · Desbloqueia as Etapas Finais</p>
    </div>

    <div id="quiz-screen" class="quiz-wrap">
        <div class="q-progress">
            <div class="q-prog-track"><div class="q-prog-fill" id="q-prog" style="width:0%"></div></div>
            <span class="q-count" id="q-count">0 / 6</span>
        </div>
        <div id="question-area"></div>
        <div id="feedback-area"></div>
        <div class="btn-row" style="margin-top:16px">
            <button class="btn-primary" id="next-btn" onclick="nextQuestion()" style="display:none">Próxima Questão →</button>
            <button class="btn-primary" id="submit-btn" onclick="submitQuiz()" style="display:none">Enviar Respostas</button>
        </div>
    </div>

    <div id="results-screen" style="display:none;padding:40px 24px">
        <div class="result-card" id="result-card"></div>
        <div id="result-actions"></div>
    </div>

    <footer>© 2026 Kodland. Material de treinamento interno de tutores — proibida a distribuição externa.</footer>

    <script src="shared.js"></script>
    <script>
        const MODULE_ID = 5;
        const PASS_PCT = 70;

        const QUESTIONS = [
            {
                q: "Um aluno define uma Função do MakeCode chamada 'openGate' que move um Pistão e toca um som. Após adicionar a definição da Função, o portão não se abre quando o jogador caminha sobre uma Placa de Pressão. O evento 'Ao Caminhar do Jogador' não tem blocos dentro dele. Qual é a causa exata e a solução?",
                opts: [
                    "O nome da Função 'openGate' é reservado — ele deve ser renomeado para algo que não contenha 'Gate'",
                    "O bloco do Pistão dentro da Função deve ser substituído por um bloco de sinal de Redstone direto",
                    "A definição da Função só funciona quando o jogador está a menos de 10 blocos do local definido",
                    "A Função está definida, mas nunca é chamada — o bloco 'Chamar Função openGate' deve ser colocado dentro do bloco de evento 'Ao Caminhar do Jogador' para que a Função seja executada quando o evento disparar"
                ],
                correct: 3,
                feedback: "Correto. Definir uma Função cria um bloco de código nomeado e reutilizável — mas ela nunca será executada por si mesma. A Função deve ser explicitamente chamada de dentro de um manipulador de eventos. Sem o bloco 'Chamar Função openGate' dentro do evento Ao Caminhar do Jogador, a definição da Função existe na memória, mas nunca é acionada. Solução: abra o bloco de evento Ao Caminhar do Jogador e adicione o bloco 'Chamar Função openGate' dentro dele."
            },
            {
                q: "Por que a Fase de Projeto estruturada exige que os alunos digitem seu acordo no chat ('Eu concordo com este plano: [nome]') em vez de simplesmente levantarem as mãos ou confirmarem verbalmente?",
                opts: [
                    "Digitar é mais rápido do que a confirmação verbal e economiza tempo na sessão",
                    "A digitação cria um compromisso social visível e persistente no histórico do chat — se um aluno tentar mudar a direção no meio da construção mais tarde, o tutor pode referenciar o acordo digitado por ele mesmo, o que reduz drasticamente as mudanças de direção no meio da construção e o desvio de escopo",
                    "O chat do próprio jogo registra automaticamente os acordos digitados como um contrato formal obrigatório",
                    "A confirmação verbal não é permitida durante as sessões por motivos de qualidade do áudio"
                ],
                correct: 1,
                feedback: "Correto. O objetivo do compromisso digitado é a responsabilidade social por meio de um registro visível e persistente. Os alunos que digitaram 'Eu concordo com este plano' no chat ficam muito mais relutantes em discutir uma mudança de direção mais tarde — o compromisso anterior deles está visível para todos e cria uma pressão de autoconsistência. Os acordos verbais são privados e efêmeros; os acordos digitados no chat são públicos e persistentes."
            },
            {
                q: "No loop Construir → Depurar → Decorar, um aluno deseja adicionar estandartes coloridos e padrões de piso personalizados ao seu projeto de ponte levadiça antes de testar se a ponte realmente se abre. O que o tutor deve fazer?",
                opts: [
                    "Redirecionar o aluno de volta para a fase de Depuração imediatamente: explicar que decorar antes de depurar significa que quaisquer bugs encontrados exigirão o rompimento da decoração para acessar o circuito — é por isso que a ordem do loop é rígida. Os estandartes vão para a lista de tarefas 'Depois da Depuração'.",
                    "Permitir — a decoração é um sistema separado e não pode afetar o circuito de Redstone abaixo dela",
                    "Deixar o aluno decidir — a ordem do loop é uma diretriz, não uma regra",
                    "Pausar a aula e fazer o aluno demonstrar que a ponte levadiça funciona antes de permitir que qualquer outro aluno continue"
                ],
                correct: 0,
                feedback: "Correto. A ordem Construir → Depurar → Decorar é rígida justamente porque a decoração construída sobre um circuito não depurado cria um problema composto: se um bug for encontrado durante a fase de decoração, acessar o circuito exigirá o rompimento da decoração — trabalho desperdiçado e tempo perdido. O tutor deve redirecionar imediatamente, adicionar a ideia dos estandartes à lista de tarefas 'Depois da Depuração' e explicar por que essa ordem importa."
            },
            {
                q: "O projeto de um aluno atendeu a todos os critérios de sucesso da Fase de Projeto com 15 minutos restantes de sessão. O aluno pede para adicionar 3 novos recursos. Qual é a resposta correta do tutor?",
                opts: [
                    "Permitir todos os 3 recursos — os alunos devem sempre ser incentivados a expandir sua ambição",
                    "Permitir 1 recurso, selecionado pelo aluno como o mais importante",
                    "Escrever as 3 ideias na lista da 'Versão 2' no chat, reconhecê-las positivamente e, em seguida, redirecionar o aluno para a Fase de Decoração — novos recursos nos 15 minutos finais correm o risco de quebrar o protótipo funcional antes do Lançamento do Estúdio de Games",
                    "Encerrar a sessão mais cedo, já que os critérios de sucesso foram atendidos"
                ],
                correct: 2,
                feedback: "Correto. A técnica da lista da 'Versão 2' alcança duas coisas simultaneamente: as ideias do aluno são valorizadas e registradas (não descartadas) e o escopo da produção permanece protegido. Adicionar novos recursos nos 15 minutos finais traz um risco real de quebrar o protótipo funcional antes da apresentação — o tutor deve proteger o que já funciona. Depois de escrever as ideias na Versão 2, redirecione para a Fase de Decoração, que usa o tempo restante de forma produtiva sem mexer nos sistemas que já funcionam."
            },
            {
                q: "Qual é a principal razão pela qual chamar a apresentação final do Módulo 5 de 'Lançamento do Estúdio de Games' em vez de 'mostre e conte' produz apresentações de alunos mensuravelmente melhores?",
                opts: [
                    "O nome mais longo dá aos alunos mais tempo para preparar o conteúdo de suas apresentações",
                    "Os pais respondem de forma mais positiva à palavra 'estúdio' do que a 'mostre e conte'",
                    "Usa a terminologia do setor que se alinha com as diretrizes de marca da Kodland",
                    "A linguagem molda o comportamento e as expectativas — 'Lançamento do Estúdio de Games' estabelece um padrão profissional que os alunos internalizam como algo que exige explicação técnica, demonstração ao vivo e propriedade pública de seu trabalho, enquanto 'mostre e conte' implica uma atividade informal de sala de aula"
                ],
                correct: 3,
                feedback: "Correto. A linguagem usada para enquadrar uma atividade afeta diretamente o esforço e a qualidade que os alunos investem nela. O 'mostre e conte' é culturalmente associado a atividades infantis casuais e de baixo impacto. O 'Lançamento do Estúdio de Games' é associado a lançamentos de produtos profissionais, exigindo explicação, demonstração ao vivo e responsabilidade pública. Alunos que ouvem 'lançamento' se preparam de forma diferente — eles ensaiam, pensam no que dizer e verificam se a demonstração está funcionando."
            },
            {
                q: "Uma equipe tem três alunos e está prestes a começar o Módulo 5. A Fase de Projeto atribui quatro papéis: Arquiteto, Programador, Decorador e Apresentador. Como o tutor deve lidar com essa diferença?",
                opts: [
                    "Pular a atribuição de papéis completamente — os papéis são opcionais para grupos de 3 ou menos alunos",
                    "Combinar os papéis logicamente: Arquiteto + Decorador (visão estrutural e acabamento visual), Programador (toda a lógica do MakeCode e Redstone) e o Apresentador, que também auxilia um outro papel. Cada aluno ainda tem uma área de propriedade principal, e a equipe discute qual combinação faz sentido para o seu tipo específico de projeto e forças individuais",
                    "Pedir para o quarto aluno de outra equipe se juntar a eles e preencher o papel que falta",
                    "Atribuir os quatro papéis para três alunos dando a um aluno dois papéis principais — ele se torna Arquiteto e Programador simultaneamente"
                ],
                correct: 1,
                feedback: "Correto. A combinação de papéis é a solução padrão quando o tamanho da equipe não corresponde à contagem de papéis. A combinação lógica para uma equipe de 3 pessoas é: (1) Arquiteto + Decorador — um aluno assume o design estrutural e o acabamento visual; (2) Programador — propriedade total de todo o código e Redstone; (3) Apresentador — que também ajuda quem tiver mais trabalho em qualquer momento. A regra crítica é que cada aluno ainda tenha uma área de propriedade principal — a combinação de papéis não deve fazer com que um único aluno domine todas as decisões."
            }
        ];

        let current = 0, answers = [], answered = false;
        const LETTERS = ['A', 'B', 'C', 'D'];

        function renderQuestion() {
            const q = QUESTIONS[current];
            answered = false;
            document.getElementById('q-count').textContent = `${current} / ${QUESTIONS.length}`;
            document.getElementById('q-prog').style.width = `${current / QUESTIONS.length * 100}%`;
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('feedback-area').innerHTML = '';
            document.getElementById('question-area').innerHTML = `
        <div class="qnum">Questão ${current + 1} de ${QUESTIONS.length}</div>
        <div class="qtext">${q.q}</div>
        <div class="opt-list" id="opt-list">
          ${q.opts.map((o, i) => `
            <div class="opt" id="opt-${i}" onclick="selectOpt(${i})">
              <span class="opt-letter">${LETTERS[i]}</span><span>${o}</span>
            </div>`).join('')}
        </div>`;
        }

        function selectOpt(i) {
            if (answered) return;
            answered = true;
            const q = QUESTIONS[current];
            answers[current] = i;
            for (let j = 0; j < q.opts.length; j++) {
                const el = document.getElementById(`opt-${j}`);
                el.classList.add('disabled');
                if (j === q.correct) el.classList.add('correct');
                else if (j === i) el.classList.add('wrong');
            }
            const isRight = i === q.correct;
            document.getElementById('feedback-area').innerHTML = `
        <div class="feedback-box ${isRight ? 'ok' : 'bad'} show">
          ${isRight ? '✅ ' : '❌ '} ${q.feedback}
        </div>`;
            if (current < QUESTIONS.length - 1)
                document.getElementById('next-btn').style.display = 'inline-flex';
            else
                document.getElementById('submit-btn').style.display = 'inline-flex';
        }

        function nextQuestion() {
            current++;
            renderQuestion();
            window.scrollTo(0, 0);
        }

        function submitQuiz() {
            const score = answers.filter((a, i) => a === QUESTIONS[i].correct).length;
            const pct = Math.round(score / QUESTIONS.length * 100);
            const passed = pct >= PASS_PCT;

            if (passed) {
                const prev = getModuleScore(MODULE_ID);
                if (!prev || pct > prev) markModulePassed(MODULE_ID, pct);
            }

            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('results-screen').style.display = 'block';

            document.getElementById('result-card').innerHTML = `
        <div class="result-emoji">${passed ? '🏆' : '😅'}</div>
        <div class="result-title">${passed ? 'Todos os 5 Módulos Concluídos!' : 'Não Foi Dessa Vez'}</div>
        <div class="result-pct ${passed ? 'pass' : 'fail'}">${pct}%</div>
        <div class="result-sub">Você respondeu corretamente a <strong>${score} de ${QUESTIONS.length}</strong> questões.
          ${passed
                    ? ' Excelente — você concluiu todos os cinco módulos de treinamento.'
                    : ` Uma pontuação de <strong>${PASS_PCT}%</strong> ou mais é necessária para progredir. Revise o Módulo 5 e tente novamente.`}
        </div>`;

            if (passed) {
                // Rota através da Biblioteca antes do DST
                document.getElementById('result-actions').innerHTML = `
          <div class="next-step-card">
            <h4>📖 Mais Um Passo Antes do Teste Final</h4>
            <p>Revise a Biblioteca de Aulas de Sucesso — uma sessão real avaliada com 16 anotações com marcação de tempo. Estudá-la aprimorará sua habilidade de aplicar tudo o que aprendeu antes de fazer o Digital Skill Test.</p>
            <div class="btn-row">
              <a href="PtDST.html#library" class="btn-library-cta">Ver Referência de Aula de Sucesso →</a>
              <a href="PtDST.html#dst-section" class="btn-skip-dst">Pular para o Digital Skill Test</a>
            </div>
          </div>
          <div class="btn-row center" style="margin-top:14px">
            <button class="btn-outline" onclick="goHome()">← Painel</button>
          </div>`;
            } else {
                document.getElementById('result-actions').innerHTML = `
          <div class="btn-row center" style="margin-top:0">
            <button class="btn-primary" onclick="retake()">Refazer Teste</button>
            <a href="PtModule5.html" class="btn-outline">← Revisar Módulo 5</a>
          </div>`;
            }

            window.scrollTo(0, 0);
        }

        function retake() {
            current = 0; answers = [];
            document.getElementById('quiz-screen').style.display = 'block';
            document.getElementById('results-screen').style.display = 'none';
            renderQuestion();
            window.scrollTo(0, 0);
        }

        initShared();
        if (!isModuleUnlocked(MODULE_ID)) {
            alert('Por favor, conclua os módulos anteriores primeiro.');
            goHome();
        }
        document.getElementById('top-progress').style.width = `${getOverallProgress() / 5 * 100}%`;
        renderQuestion();
    </script>
</body>
</html>
