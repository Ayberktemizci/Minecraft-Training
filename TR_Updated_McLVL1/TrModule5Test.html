<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modül 5 Testi — Yaratıcının Kalesi | Kodland</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  .quiz-header{background:linear-gradient(135deg,#7E22CE,#EC4899);padding:24px 32px;color:#fff;text-align:center}
  .quiz-header h2{font-family:'Nunito',sans-serif;font-size:22px;font-weight:900;color:#fff;margin-bottom:4px}
  .quiz-header p{color:rgba(255,255,255,.85);font-size:13px}
  .feedback-box{display:none;margin-top:14px;border-radius:var(--rsm);padding:13px 16px;font-size:13.5px;line-height:1.6;border:2px solid}
  .feedback-box.show{display:block}
  .feedback-box.ok{background:var(--ok-bg);border-color:var(--ok-b);color:var(--ok-t)}
  .feedback-box.bad{background:var(--no-bg);border-color:var(--no-b);color:var(--no-t)}
  .next-step-card{margin-top:18px;background:linear-gradient(135deg,#0e1f0a,#2f5a1e);border:2px solid rgba(196,240,70,.3);border-radius:var(--r);padding:22px 24px;text-align:center;position:relative;overflow:hidden}
  .next-step-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(196,240,70,.1) 0%,transparent 75%);pointer-events:none}
  .next-step-card h4{font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;color:#fff;margin-bottom:6px;position:relative}
  .next-step-card p{font-size:13px;color:rgba(255,255,255,.68);line-height:1.55;margin-bottom:14px;position:relative;max-width:440px;margin-left:auto;margin-right:auto}
  .next-step-card .btn-row{justify-content:center;position:relative}
  .btn-library-cta{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:var(--rpill);background:var(--lime);color:var(--ink);font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;border:2px solid var(--lime-d);text-decoration:none;transition:all .15s;letter-spacing:.2px}
  .btn-library-cta:hover{background:var(--lime-d);transform:translateY(-2px);box-shadow:0 6px 20px rgba(196,240,70,.35)}
  .btn-lvl2{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:var(--rpill);background:#F03D9E;color:#fff;font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;border:2px solid #C0307A;text-decoration:none;transition:all .15s;letter-spacing:.2px}
  .btn-lvl2:hover{background:#C0307A;transform:translateY(-2px);box-shadow:0 6px 20px rgba(240,61,158,.4)}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-logo" onclick="goHome()" style="cursor:pointer">
    <span class="logo-mark">Kodland</span><div class="logo-div"></div>
    <span class="logo-sub">Tutor Eğitimi</span>
  </div>
  <div class="nav-r">
    <button class="nav-back" onclick="history.back()">← Modül 5</button>
    <button class="icon-btn" id="theme-toggle">🌙</button>
  </div>
</nav>
<div class="progress-strip"><div class="progress-fill" id="top-progress" style="width:0%"></div></div>
<div class="quiz-header">
  <h2>📝 Modül 5 Bilgi Kontrolü</h2>
  <p>Yaratıcının Kalesi · 6 Soru · %70 Geçmek İçin · Final Aşamalarının Kilidini Açar</p>
</div>
<div id="quiz-screen" class="quiz-wrap">
  <div class="q-progress">
    <div class="q-prog-track"><div class="q-prog-fill" id="q-prog" style="width:0%"></div></div>
    <span class="q-count" id="q-count">0 / 6</span>
  </div>
  <div id="question-area"></div>
  <div id="feedback-area"></div>
  <div class="btn-row" style="margin-top:16px">
    <button class="btn-primary" id="next-btn" onclick="nextQuestion()" style="display:none">Sonraki Soru →</button>
    <button class="btn-primary" id="submit-btn" onclick="submitQuiz()" style="display:none">Yanıtları Gönder</button>
  </div>
</div>
<div id="results-screen" style="display:none;padding:40px 24px">
  <div class="result-card" id="result-card"></div>
  <div id="result-actions"></div>
</div>
<footer>© 2026 Kodland. Dahili tutor eğitim materyali — harici dağıtım için değildir.</footer>
<script src="shared.js"></script>
<script>
const MODULE_ID = 5;
const PASS_PCT  = 70;
const QUESTIONS = [
  {
    q: "Bir öğrenci, Pistonu hareket ettiren ve ses çalan 'kapıyıAç' adlı bir MakeCode Fonksiyonu tanımlıyor. Fonksiyon tanımını ekledikten sonra, oyuncu Basınç Plakasının üzerinde yürüdüğünde kapı açılmıyor. 'Oyuncu Yürüdüğünde' olayının içinde hiçbir blok yok. Kesin neden ve düzeltme nedir?",
    opts: [
      "'kapıyıAç' adı ayrılmıştır — 'Kapı' içermeyen bir şeyle yeniden adlandırılmalıdır",
      "Fonksiyonun içindeki Piston bloğu doğrudan bir Redstone sinyal bloğuyla değiştirilmelidir",
      "Fonksiyon tanımı yalnızca oyuncu tanımlanan konumun 10 blok yakınındayken çalışır",
      "Fonksiyon tanımlanmış ama asla çağrılmamış — Fonksiyonun olay ateşlendiğinde çalışması için 'Oyuncu Yürüdüğünde' olay bloğunun içine 'Fonksiyon Çağır kapıyıAç' bloğu yerleştirilmelidir"
    ],
    correct: 3,
    feedback: "Fonksiyon tanımlamak, adlandırılmış yeniden kullanılabilir bir kod bloğu oluşturur — ama kendi başına asla çalışmaz. Fonksiyon açıkça bir olay işleyicisinden çağrılmalıdır. 'Fonksiyon Çağır kapıyıAç' olmadan Oyuncu Yürüdüğünde olayı içinde, Fonksiyon tanımı bellekte var olur ama asla tetiklenmez."
  },
  {
    q: "Yapılandırılmış Plan Aşaması neden öğrencilerin anlaşmayı el kaldırarak veya sözlü onaylayarak değil, sohbete yazarak ('Bu planı kabul ediyorum: [ad]') onaylamasını gerektirir?",
    opts: [
      "Yazma sözel onaydan daha hızlıdır ve oturumda zaman kazandırır",
      "Yazma, sohbet günlüğünde görünür, kalıcı bir sosyal taahhüt oluşturur — bir öğrenci daha sonra inşa ortasında yön değiştirmeye çalışırsa tutor kendi yazılı anlaşmasına atıfta bulunabilir; bu, inşa ortasındaki yön değişikliklerini ve kapsam kaymasını dramatik biçimde azaltır",
      "Oyunun sohbeti yazılan anlaşmaları otomatik olarak resmi bağlayıcı sözleşme olarak kaydeder",
      "Ses kalitesi nedeniyle oturumlarda sözel onaya izin verilmez"
    ],
    correct: 1,
    feedback: "Yazılı taahhüdün amacı, görünür, kalıcı bir kayıt aracılığıyla sosyal hesap verebilirliktir. Sohbete 'Bu planı kabul ediyorum' yazan öğrenciler, taahhütleri herkese görünür olduğu için daha sonra yön değişikliği için tartışmaya çok daha az isteklidir. Sözel anlaşmalar özel ve geçiciyken sohbet yazılı anlaşmalar kamusal ve kalıcıdır."
  },
  {
    q: "İnşa → Hata Ayıkla → Dekore Et döngüsünde, bir öğrenci köprü projesinin gerçekten açılıp açılmadığını test etmeden önce renkli pankartlar ve özel zemin desenleri eklemek istiyor. Tutor ne yapmalıdır?",
    opts: [
      "Öğrenciyi hemen Hata Ayıklama aşamasına yönlendirin: hata ayıklamadan önce dekore etmenin, sonradan bulunan bir hatada devreye erişmek için dekorasyonun kırılmasını gerektireceğini açıklayın — döngü sırası bu yüzden katıdır. Pankartlar 'Hata Ayıklamadan Sonra' görev listesine gider.",
      "İzin verin — dekorasyon ayrı bir sistemdir ve altındaki Redstone devresini etkileyemez",
      "Öğrencinin karar vermesine izin verin — döngü sırası kural değil, bir kılavuzdur",
      "Dersi durdurun ve herhangi bir öğrencinin devam etmesine izin vermeden önce öğrencinin köprünün çalıştığını göstermesini sağlayın"
    ],
    correct: 0,
    feedback: "İnşa → Hata Ayıkla → Dekore Et sırası tam olarak hata ayıklanmamış devre üzerine inşa edilen dekorasyonun bileşik bir sorun yaratması nedeniyle katıdır: dekorasyon aşamasında bir hata bulunursa devreye erişmek dekorasyonun kırılmasını gerektirir — kaybedilen iş ve zaman. Tutor hemen yönlendirmelidir."
  },
  {
    q: "Bir öğrencinin projesi, oturumda 15 dakika kala Plan Aşamasındaki tüm başarı kriterlerini karşıladı. Öğrenci 3 yeni özellik eklemek istiyor. Doğru tutor yanıtı nedir?",
    opts: [
      "Tüm 3 özelliğe izin verin — öğrenciler her zaman hırslarını genişletmeye teşvik edilmelidir",
      "Öğrencinin en önemli olarak seçtiği 1 özelliğe izin verin",
      "3 fikri sohbetteki 'Versiyon 2' listesine yazın, olumlu kabul edin, ardından öğrenciyi Dekorasyon Aşamasına yönlendirin — son 15 dakikadaki yeni özellikler Oyun Stüdyosu Lansmanından önce çalışan prototipi bozma riski taşır",
      "Başarı kriterleri karşılandığı için oturumu erken kapatın"
    ],
    correct: 2,
    feedback: "'Versiyon 2' listesi tekniği aynı anda iki şey başarır: öğrencinin fikirleri değerlendirilir ve kaydedilir (reddedilmez), prodüksiyon kapsamı korunur. Son 15 dakikada yeni özellikler eklemek, sunumdan önce çalışan prototipi bozma gerçek riskini taşır. Fikirleri Versiyon 2'ye yazdıktan sonra, kalan zamanı işlevsel sistemlere dokunmadan verimli kullanabilen Dekorasyon Aşamasına yönlendirin."
  },
  {
    q: "Final sunumunu 'göster ve anlat' yerine 'Oyun Stüdyosu Lansmanı' olarak adlandırmanın ölçülebilir biçimde daha iyi öğrenci sunumları üretmesinin birincil nedeni nedir?",
    opts: [
      "Daha uzun isim öğrencilere sunum içeriklerini hazırlamak için daha fazla zaman verir",
      "Ebeveynler 'stüdyo' kelimesine 'göster ve anlat'tan daha olumlu tepki verir",
      "Kodland marka yönergeleriyle uyumlu endüstri terminolojisi kullanır",
      "Dil davranışı ve beklentileri şekillendirir — 'Oyun Stüdyosu Lansmanı', öğrencilerin profesyonel bir standart olarak içselleştirdiği bir çıta belirler — teknik açıklama, canlı demo ve çalışmalarını herkesin önünde sahiplenmeyi gerektirir; oysa 'göster ve anlat' gayri resmi bir sınıf aktivitesi çağrışımı yapar"
    ],
    correct: 3,
    feedback: "Bir aktiviteyi çerçevelemek için kullanılan dil, öğrencilerin ona yatırım yaptığı çaba ve kaliteyi doğrudan etkiler. 'Göster ve anlat' kültürel olarak geçici, düşük riskli çocukluk aktiviteleriyle ilişkilendirilir. 'Oyun Stüdyosu Lansmanı' profesyonel ürün lansmanlarıyla ilişkilendirilir — açıklama, canlı demo ve herkese açık hesap verebilirlik gerektirir."
  },
  {
    q: "Üç öğrencili bir ekip Modül 5'e başlamak üzere. Plan Aşaması dört rol atar: Mimar, Programcı, Dekoratör ve Sunucu. Tutor bu uyumsuzluğu nasıl ele almalıdır?",
    opts: [
      "Rol atamasını tamamen atlayın — roller 3 veya daha az kişilik gruplar için isteğe bağlıdır",
      "Rolleri mantıksal olarak birleştirin: Mimar + Dekoratör (yapısal vizyon ve görsel bitirme), Programcı (tüm MakeCode ve Redstone mantığı) ve aynı zamanda başka bir role yardım eden Sunucu. Her öğrencinin hâlâ birincil sahiplik alanı var",
      "Eksik rolü doldurmak için başka bir ekipten dördüncü öğrenci isteyin",
      "Dört rolü üç öğrenciye ata — birine iki birincil rol ver, aynı anda hem Mimar hem Programcı"
    ],
    correct: 1,
    feedback: "Rol birleştirme, ekip büyüklüğü rol sayısıyla eşleşmediğinde standart çözümdür. 3 kişilik ekip için mantıksal kombinasyon: (1) Mimar + Dekoratör — bir öğrenci hem yapısal tasarıma hem görsel bitirişe sahip; (2) Programcı — tüm kodlar ve Redstone üzerinde tam sahiplik; (3) En çok işi olan kişiye de yardım eden Sunucu. Kritik kural: her öğrencinin hâlâ birincil sahiplik alanı olmalı — rol birleştirme tek öğrencinin tüm kararları ele geçirmesiyle sonuçlanmamalıdır."
  }
];
let current = 0, answers = [], answered = false;
const LETTERS = ['A','B','C','D'];
function renderQuestion() {
  const q = QUESTIONS[current];
  answered = false;
  document.getElementById('q-count').textContent = `${current} / ${QUESTIONS.length}`;
  document.getElementById('q-prog').style.width = `${current / QUESTIONS.length * 100}%`;
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('submit-btn').style.display = 'none';
  document.getElementById('feedback-area').innerHTML = '';
  document.getElementById('question-area').innerHTML = `
    <div class="qnum">Soru ${current + 1} / ${QUESTIONS.length}</div>
    <div class="qtext">${q.q}</div>
    <div class="opt-list">${q.opts.map((o,i) => `<div class="opt" id="opt-${i}" onclick="selectOpt(${i})"><span class="opt-letter">${LETTERS[i]}</span><span>${o}</span></div>`).join('')}</div>`;
}
function selectOpt(i) {
  if (answered) return;
  answered = true;
  const q = QUESTIONS[current];
  answers[current] = i;
  for (let j = 0; j < q.opts.length; j++) {
    const el = document.getElementById(`opt-${j}`);
    el.classList.add('disabled');
    if (j === q.correct) el.classList.add('correct');
    else if (j === i) el.classList.add('wrong');
  }
  const isRight = i === q.correct;
  const _fb = isRight ? '✅ Doğru! ' + q.feedback : '❌ Yanlış. Doğru yanıt: ' + q.opts[q.correct] + ' — ' + q.feedback;
  document.getElementById('feedback-area').innerHTML = `<div class="feedback-box ${isRight?'ok':'bad'} show">${_fb}</div>`;
  if (current < QUESTIONS.length - 1) document.getElementById('next-btn').style.display = 'inline-flex';
  else document.getElementById('submit-btn').style.display = 'inline-flex';
}
function nextQuestion() { current++; renderQuestion(); window.scrollTo(0,0); }
function submitQuiz() {
  const score = answers.filter((a,i) => a === QUESTIONS[i].correct).length;
  const pct = Math.round(score / QUESTIONS.length * 100);
  const passed = pct >= PASS_PCT;
  if (passed) { const prev = getModuleScore(MODULE_ID); if (!prev || pct > prev) markModulePassed(MODULE_ID, pct); }
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = 'block';
  document.getElementById('result-card').innerHTML = `
    <div class="result-emoji">${passed?'🏆':'😅'}</div>
    <div class="result-title">${passed?'5 Modülün Tamamı Tamamlandı!':'Henüz Olmadı'}</div>
    <div class="result-pct ${passed?'pass':'fail'}">%${pct}</div>
    <div class="result-sub"><strong>${score} / ${QUESTIONS.length}</strong> soruyu doğru yanıtladınız.
      ${passed?' Olağanüstü — beş eğitim modülünün tamamını tamamladınız.':` İlerleme için <strong>${PASS_PCT}%</strong> veya üzeri gereklidir. Modül 5'i gözden geçirin ve tekrar deneyin.`}</div>`;
  if (passed) {
    document.getElementById('result-actions').innerHTML = `
      <div class="next-step-card">
        <h4>🏆 Seviye 1 Tamamlandı — Eğitim Seviye 2'de Devam Ediyor</h4>
        <p>Tüm beş Seviye 1 modülünü tamamladınız. Başarılı Dersler Kütüphanesi'ni inceleyin, ardından Dijital Beceri Testinin sizi beklediği Minecraft Seviye 2 ile yolculuğunuza devam edin.</p>
        <div class="btn-row">
          <a href="TrDST.html#library" class="btn-library-cta">📖 Başarılı Ders Referansını Gör →</a>
          <a href="LEVEL_2_URL_PLACEHOLDER" class="btn-lvl2">🚀 Minecraft Seviye 2'ye Devam Et →</a>
        </div>
      </div>
      <div class="btn-row center" style="margin-top:14px">
        <button class="btn-outline" onclick="goHome()">← Panel</button>
      </div>`;
  } else {
    document.getElementById('result-actions').innerHTML = `
      <div class="btn-row center" style="margin-top:0">
        <button class="btn-primary" onclick="retake()">Testi Tekrarla</button>
        <a href="TrModule5.html" class="btn-outline">← Modül 5'i Gözden Geçir</a>
      </div>`;
  }
  window.scrollTo(0,0);
}
function retake() {
  current = 0; answers = [];
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('results-screen').style.display = 'none';
  renderQuestion(); window.scrollTo(0,0);
}
initShared();
if (!isModuleUnlocked(MODULE_ID)) { alert('Lütfen önce önceki modülleri tamamlayın.'); goHome(); }
document.getElementById('top-progress').style.width = `${getOverallProgress() / 5 * 100}%`;
renderQuestion();
</script>
</body>
</html>
