<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Modulo 2 — Città della Luce | Kodland</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        .quiz-header {
            background: linear-gradient(135deg,#1D4ED8,#3B82F6);
            padding: 24px 32px;
            color: #fff;
            text-align: center
        }

            .quiz-header h2 {
                font-family: 'Nunito',sans-serif;
                font-size: 22px;
                font-weight: 900;
                color: #fff;
                margin-bottom: 4px
            }

            .quiz-header p {
                color: rgba(255,255,255,.8);
                font-size: 13px
            }

        .feedback-box {
            display: none;
            margin-top: 14px;
            border-radius: var(--rsm);
            padding: 13px 16px;
            font-size: 13.5px;
            line-height: 1.6;
            border: 2px solid
        }

            .feedback-box.show {
                display: block
            }

            .feedback-box.ok {
                background: var(--ok-bg);
                border-color: var(--ok-b);
                color: var(--ok-t)
            }

            .feedback-box.bad {
                background: var(--no-bg);
                border-color: var(--no-b);
                color: var(--no-t)
            }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-logo" onclick="goHome()" style="cursor:pointer">
            <span class="logo-mark">Kodland</span><div class="logo-div"></div>
            <span class="logo-sub">Formazione Tutor</span>
        </div>
        <div class="nav-r">
            <button class="nav-back" onclick="history.back()">← Modulo 2</button>
            <button class="icon-btn" id="theme-toggle">🌙</button>
        </div>
    </nav>
    <div class="progress-strip"><div class="progress-fill" id="top-progress" style="width:0%"></div></div>

    <div class="quiz-header">
        <h2>📝 Verifica delle Conoscenze Modulo 2</h2>
        <p>🏙️ Città della Luce · 6 Domande · 70% per Superare</p>
    </div>

    <div id="quiz-screen" class="quiz-wrap">
        <div class="q-progress">
            <div class="q-prog-track"><div class="q-prog-fill" id="q-prog" style="width:0%"></div></div>
            <span class="q-count" id="q-count">0 / 6</span>
        </div>
        <div id="question-area"></div>
        <div id="feedback-area"></div>
        <div class="btn-row" style="margin-top:16px">
            <button class="btn-primary" id="next-btn" onclick="nextQuestion()" style="display:none">Prossima Domanda →</button>
            <button class="btn-primary" id="submit-btn" onclick="submitQuiz()" style="display:none">Invia le Risposte</button>
        </div>
    </div>

    <div id="results-screen" style="display:none;padding:40px 24px">
        <div class="result-card" id="result-card"></div>
        <div class="btn-row center" style="margin-top:20px" id="result-actions"></div>
    </div>

    <footer>© 2026 Kodland. Materiale di formazione interna per i tutor.</footer>
    <script src="shared.js"></script>
    <script>
        /*
          MODULO 2 — 6 DOMANDE UNICHE (nessuna sovrapposizione con il Modulo 1 o il DST)
          Indici delle risposte corrette (0=A, 1=B, 2=C, 3=D):
          Q1→D(3)  Q2→A(0)  Q3→C(2)  Q4→B(1)  Q5→D(3)  Q6→A(0)
          Pattern: 3,0,2,1,3,0 — variato, nessuna ripetizione consecutiva.
        */
        const MODULE_ID = 2;
        const PASS_PCT = 70;

        const QUESTIONS = [
            {
                q: "Uno studente esegue /clone 100 64 200  104 68 204  100 64 200 e non succede nulla. Qual è la causa e la corretta soluzione?",
                opts: [
                    "La destinazione è troppo lontana — /clone ha una portata massima di 10 blocchi",
                    "La coordinata Y della destinazione deve essere sempre 0",
                    "Il comando è stato digitato correttamente — il clone appare sempre dopo un ritardo di 5 secondi",
                    "Le regioni sorgente e destinazione si sovrappongono — le coordinate di destinazione devono essere esterne al box di collisione di origine"
                ],
                correct: 3,  // D
                feedback: "Corretto. La destinazione di /clone [100 64 200] è identica al primo angolo della sorgente — le regioni si sovrappongono completamente, causando un fallimento silenzioso. La destinazione deve essere una coppia di coordinate che si trova interamente al di fuori del box di collisione di origine (es. /clone 100 64 200  104 68 204  120 64 200)."
            },
            {
                q: "Uno studente digita /tp @s ~0 64 ~0. Cosa fa questo comando di diverso sia da /tp @s ~0 ~0 ~0 sia da /tp @s 0 64 0?",
                opts: [
                    "Mantiene les posizioni X e Z correnti dello studente ma imposta l'altitudine esattamente a Y=64, combinando un valore assoluto con due scostamenti relativi",
                    "Teletrasporta lo studente all'origine del mondo esattamente al livello del mare",
                    "Teletrasporta tutti i giocatori (~0) al piano 64 — @s è il selettore per tutti gli studenti",
                    "È una sintassi non valida — non è possibile combinare la tilde e i valori assoluti in un singolo comando /tp"
                ],
                correct: 0,  // A
                feedback: "Corretto. Minecraft consente la sintassi delle coordinate miste. ~0 mantiene la X corrente invariata; 64 (senza tilde) imposta l'altitudine esattamente a Y=64; ~0 mantiene la Z corrente invariata. Questo è utile per i comandi di 'allineamento al livello del mare' senza modificare la posizione orizzontale. /tp @s ~0 ~0 ~0 non sposta affatto il giocatore; /tp @s 0 64 0 lo invia all'origine del mondo."
            },
            {
                q: "La griglia del Banco da lavoro ha 9 slot. Uno studente posiziona due blocchi di Pietra uno accanto all'altro nella fila superiore del Banco da lavoro e non ottiene nulla. Qual è il problema?",
                opts: [
                    "Le pedane a pressione di pietra richiedono tre blocchi di Pietra, non due",
                    "Il Banco da lavoro deve essere posizionato a terra prima che le ricette funzionino",
                    "La ricetta della pedana a pressione di pietra richiede due blocchi di Pietra posizionati in uno schema orizzontale 1×2 in qualsiasi riga — lo studente probabilmente li ha posizionati negli slot 1 e 3 invece di 1 e 2 (adiacenti), saltando lo slot centrale",
                    "La Pietra non può essere utilizzata nel Banco da lavoro — richiede il Pietrisco"
                ],
                correct: 2,  // C
                feedback: "Corretto. La ricetta della pedana a pressione di pietra richiede due blocchi di Pietra in slot adiacenti in orizzontale (qualsiasi riga). Se lo studente ha saltato lo slot centrale — posizionando la Pietra nelle posizioni 1 e 3 anziché 1 e 2 — lo schema della griglia non corrisponde a nessuna ricetta e non viene prodotto nulla. Le ricette di fabbricazione sono rigorosamente posizionali."
            },
            {
                q: "Durante la costruzione cooperativa della città, uno studente distrugge accidentalmente 10 blocchi del ponte di un'altra squadra. Secondo il framework delle Regole del Vicinato, qual è la risposta corretta del tutor?",
                opts: [
                    "Rimuovere temporaneamente lo studente dalla sessione come chiara conseguenza della violazione",
                    "Fare riferimento alla Regola del Vicinato per nome, guidare lo studente ad aiutare a ricostruire i blocchi danneggiati e sfruttare il momento per rafforzare gli standard della comunità senza usare un linguaggio punitivo",
                    "Ignorare l'accaduto a meno che lo studente colpito non si lamenti, per evitar di peggiorare la situazione",
                    "Mettere in pausa l'intera sessione e ripristinare il mondo a prima che si verificasse il danno"
                ],
                correct: 1,  // B
                feedback: "Corretto. Le risposte punitive (rimozione, pausa della sessione) generano risentimento e impostano un tono timoroso in classe. Il framework delle Regole del Vicinato è ristorativo, non punitivo: nomina la regola ('Ricorda — Regola del Vicinato'), guida lo studente a ricostruire ciò che è stato rotto e usalo come un momento per gli standard della comunità. Questo modella le norme collaborative del mondo reale che l'attività di costruzione della città è progettata per mettere in pratica."
            },
            {
                q: "Una trappola con pedana a pressione è collegata a un Distributore a 20 blocchi di distanza. Uno studente sale sulla pedana ma il Distributore si attiva con un notevole ritardo di 1 secondo. Qual è la causa tecnica?",
                opts: [
                    "Il Distributore ha bisogno di un Ripetitore di Redstone accanto ad esso per attivarsi alla velocità normale",
                    "C'è un'interruzione nel cavo di Redstone che sta rallentando il segnale",
                    "La pedana a pressione si attiva solo al secondo passaggio, non al primo",
                    "I segnali di Redstone viaggiano a 1 blocco per tick (0.05 secondi); attraverso 20 blocchi di polvere, the segnale impiega 20 tick = 1 secondo per raggiungere il Distributore — questo è il normale comportamento fisico, non un bug"
                ],
                correct: 3,  // D
                feedback: "Corretto. La velocità di propagazione del segnale di Redstone è di 1 blocco per tick, e un tick equivale a 0.05 seconds. Un cavo di 20 blocchi introduce quindi un ritardo di 20 tick = 1 secondo. Questo è il normale comportamento fisico di Minecraft. Se è necessaria una risposta più rapida, accorcia il cavo o usa un Comparatore di Redstone per amplificare senza ritardi. Importante: questa è un'opportunità didattica sulla propagazione del segnale, non un errore da 'aggiustare'."
            },
            {
                q: "Dopo la sessione cooperativa di oggi, un tutor desidera fornire un elogio specifico e legato al comportamento alla squadra dei Costruttori di Ponti. Quale dei seguenti è l'esempio più efficace?",
                opts: [
                    "\"Ottimo lavoro, Costruttori di Ponti — avete usato coordinate esatte per allineare i punti finali del vostro ponte con i distretti di entrambe le squadre, e il design del vostro arco dimostra che avete pensato alla simmetria. Questo è un pensiero architettonico professionale.\"",
                    "\"Ottimo lavoro oggi, squadra — avete costruito un ponte davvero bello!\"",
                    "\"I Costruttori di Ponti sono stati la squadra migliore oggi — molto migliori degli altri.\"",
                    "\"Avete fatto bene. La prossima volta vi assegnerò un compito bonus come ricompensa.\""
                ],
                correct: 0,  // A
                feedback: "Corretto. L'opzione A è specifica e legata al comportamento: nomina l'azione tecnica esatta ('avete usato coordinate esatte per allineare i punti finali'), il principio di design applicato ('simmetria') e lo inquadra in termini professionali ('pensiero architettonico'). Questo fornisce agli studenti informazioni chiare su quale comportamento ripetere. Gli elogi generici ('bel ponte!'), comparativi ('squadra migliore') e le ricompense differite non creano lo stesso ciclo di rinforzo."
            }
        ];

        let current = 0, answers = [], answered = false;
        const LETTERS = ['A', 'B', 'C', 'D'];

        function renderQuestion() {
            const q = QUESTIONS[current];
            answered = false;
            document.getElementById('q-count').textContent = `${current} / ${QUESTIONS.length}`;
            document.getElementById('q-prog').style.width = `${current / QUESTIONS.length * 100}%`;
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('feedback-area').innerHTML = '';
            document.getElementById('question-area').innerHTML = `
            <div class="qnum">Domanda ${current + 1} di ${QUESTIONS.length}</div>
            <div class="qtext">${q.q}</div>
            <div class="opt-list" id="opt-list">
              ${q.opts.map((o, i) => `
                <div class="opt" id="opt-${i}" onclick="selectOpt(${i})">
                  <span class="opt-letter">${LETTERS[i]}</span><span>${o}</span>
                </div>`).join('')}
            </div>`;
        }

        function selectOpt(i) {
            if (answered) return;
            answered = true;
            const q = QUESTIONS[current];
            answers[current] = i;
            for (let j = 0; j < q.opts.length; j++) {
                const el = document.getElementById(`opt-${j}`);
                el.classList.add('disabled');
                if (j === q.correct) el.classList.add('correct');
                else if (j === i) el.classList.add('wrong');
            }
            const isRight = i === q.correct;
            document.getElementById('feedback-area').innerHTML = `
            <div class="feedback-box ${isRight ? 'ok' : 'bad'} show">
              ${isRight ? '✅ ' : '❌ '} ${q.feedback}
            </div>`;
            if (current < QUESTIONS.length - 1) document.getElementById('next-btn').style.display = 'inline-flex';
            else document.getElementById('submit-btn').style.display = 'inline-flex';
        }

        function nextQuestion() { current++; renderQuestion(); window.scrollTo(0, 0); }

        function submitQuiz() {
            const score = answers.filter((a, i) => a === QUESTIONS[i].correct).length;
            const pct = Math.round(score / QUESTIONS.length * 100);
            const passed = pct >= PASS_PCT;
            if (passed) { const prev = getModuleScore(MODULE_ID); if (!prev || pct > prev) markModulePassed(MODULE_ID, pct); }
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('results-screen').style.display = 'block';
            document.getElementById('result-card').innerHTML = `
            <div class="result-emoji">${passed ? '🎉' : '😅'}</div>
            <div class="result-title">${passed ? 'Modulo 2 Completato!' : 'Non ci sei ancora'}</div>
            <div class="result-pct ${passed ? 'pass' : 'fail'}">${pct}%</div>
            <div class="result-sub">Hai risposto correttamente a <strong>${score} su ${QUESTIONS.length}</strong> domande.
              ${passed ? ' Ottimo lavoro — hai dimostrato una solida comprensione dei contenuti del Modulo 2.'
                    : ` È richiesto un punteggio del <strong>${PASS_PCT}%</strong> per sbloccare il Modulo 3. Rivedi il materiale e riprova.`}
            </div>`;
            document.getElementById('result-actions').innerHTML = passed
                ? `<a href="ItModule3.html" class="btn-primary">Continua al Modulo 3 →</a>
               <button class="btn-outline" onclick="goHome()">← Dashboard</button>`
                : `<button class="btn-primary" onclick="retake()">Ripeti il Test</button>
               <a href="ItModule2.html" class="btn-outline">← Rivedi il Modulo 2</a>`;
            window.scrollTo(0, 0);
        }

        function retake() {
            current = 0; answers = [];
            document.getElementById('quiz-screen').style.display = 'block';
            document.getElementById('results-screen').style.display = 'none';
            renderQuestion(); window.scrollTo(0, 0);
        }

        initShared();
        if (!isModuleUnlocked(MODULE_ID)) { alert('Per favore, completa prima il Modulo 1.'); goHome(); }
        document.getElementById('top-progress').style.width = `${getOverallProgress() / 5 * 100}%`;
        renderQuestion();
    </script>
</body>
</html>
