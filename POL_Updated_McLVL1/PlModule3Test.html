<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Modułu 3 — Oaza Logiki | Kodland</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <style>
        .quiz-header {
            background: linear-gradient(135deg,#6D28D9,#8B5CF6);
            padding: 24px 32px;
            color: #fff;
            text-align: center
        }

            .quiz-header h2 {
                font-family: 'Nunito',sans-serif;
                font-size: 22px;
                font-weight: 900;
                color: #fff;
                margin-bottom: 4px
            }

            .quiz-header p {
                color: rgba(255,255,255,.8);
                font-size: 13px
            }

        .feedback-box {
            display: none;
            margin-top: 14px;
            border-radius: var(--rsm);
            padding: 13px 16px;
            font-size: 13.5px;
            line-height: 1.6;
            border: 2px solid
        }

            .feedback-box.show {
                display: block
            }

            .feedback-box.ok {
                background: var(--ok-bg);
                border-color: var(--ok-b);
                color: var(--ok-t)
            }

            .feedback-box.bad {
                background: var(--no-bg);
                border-color: var(--no-b);
                color: var(--no-t)
            }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-logo" onclick="goHome()" style="cursor:pointer">
            <span class="logo-mark">Kodland</span><div class="logo-div"></div>
            <span class="logo-sub">Szkolenie dla Tutorów</span>
        </div>
        <div class="nav-r">
            <button class="nav-back" onclick="history.back()">← Moduł 3</button>
            <button class="icon-btn" id="theme-toggle">🌙</button>
        </div>
    </nav>
    <div class="progress-strip"><div class="progress-fill" id="top-progress" style="width:0%"></div></div>

    <div class="quiz-header">
        <h2>📝 Sprawdzian Wiedzy z Modułu 3</h2>
        <p>🧩 Oaza Logiki · 6 pytań · 70% do zaliczenia</p>
    </div>

    <div id="quiz-screen" class="quiz-wrap">
        <div class="q-progress">
            <div class="q-prog-track"><div class="q-prog-fill" id="q-prog" style="width:0%"></div></div>
            <span class="q-count" id="q-count">0 / 6</span>
        </div>
        <div id="question-area"></div>
        <div id="feedback-area"></div>
        <div class="btn-row" style="margin-top:16px">
            <button class="btn-primary" id="next-btn" onclick="nextQuestion()" style="display:none">Następne pytanie →</button>
            <button class="btn-primary" id="submit-btn" onclick="submitQuiz()" style="display:none">Prześlij odpowiedzi</button>
        </div>
    </div>

    <div id="results-screen" style="display:none;padding:40px 24px">
        <div class="result-card" id="result-card"></div>
        <div class="btn-row center" style="margin-top:20px" id="result-actions"></div>
    </div>

    <footer>© 2026 Kodland. Wewnętrzny materiał szkoleniowy dla tutorów.</footer>
    <script src="shared.js"></script>
    <script>
        /*
          MODUŁ 3 — 6 UNIKALNYCH PYTAŃ (zero nakładania się z Modułami 1-2 lub DST)
          Indeksy prawidłowych odpowiedzi (0=A, 1=B, 2=C, 3=D):
          Q1→B(1)  Q2→C(2)  Q3→A(0)  Q4→D(3)  Q5→B(1)  Q6→C(2)
          Wzór: 1,2,0,3,1,2 — zróżnicowany, brak dwóch identycznych odpowiedzi pod rząd.
        */
        const MODULE_ID = 3;
        const PASS_PCT = 70;

        const QUESTIONS = [
            {
                q: "Zmienna „score” ucznia zawsze wyświetla wartość 1 natychmiast po uruchomieniu programu, zanim gracz w ogóle wykona krok. Jaka jest tego dokładna przyczyna?",
                opts: [
                    "Zdarzenie „Przy chodzeniu gracza” aktywuje się automatycznie raz podczas inicjalizacji programu",
                    "Blok inicjalizacji „ustaw score = 0” znajduje się wewnątrz zdarzenia „Przy chodzeniu gracza”, więc każdy krok resetuje wynik do 0 przed jego zwiększeniem — w rezultacie wynik zawsze wynosi 1",
                    "Zmienne MakeCode zawsze zaczynają się od 1, chyba że zostaną jawnie ustawione w bloku „Na starcie”",
                    "Blok „zmień score o 1” działa w nieskończonej pętli w tle"
                ],
                correct: 1,  // B
                feedback: "Poprawnie. Jeśli blok „ustaw score = 0” zostanie umieszczony wewnątrz zdarzenia chodzenia, sekwencja przy każdym kroku wygląda następująco: (1) ustaw score na 0, (2) zmień score o 1 — wynik zawsze wynosi 1. Rozwiązanie: przenieś „ustaw score = 0” do bloku „Na starcie”, aby uruchamiał się tylko raz przy uruchomieniu programu."
            },
            {
                q: "Uczeń chce, aby warunek wygranej aktywował się, gdy gracz zbierze 10 lub więcej klejnotów, ale warunek nigdy się nie wyzwala, nawet gdy gems = 12. Kod brzmi: jeśli gems = 10 to { say 'Wygrałeś!' }. Na czym polega problem i jak go rozwiązać?",
                opts: [
                    "Zmienna musi nazywać się „score”, a nie „gems” — MakeCode rozpoznaje tylko domyślne nazwy zmiennych",
                    "Blok „say” musi zostać zastąpiony blokiem „print” wewnątrz instrukcji warunkowych",
                    "Warunek używa operatora = (dokładnie równe 10) zamiast ≥ (większe lub równe 10) — jeśli gracz zbierze 12 klejnotów, zmienna gems nigdy nie wyniesie dokładnie 10, więc warunek nigdy nie będzie prawdziwy",
                    "Instrukcje warunkowe nie potrafią bezpośrednio odczytywać zmiennych — najpierw należy dodać osobny blok „odczytaj”"
                ],
                correct: 2,  // C
                feedback: "Poprawnie. Przy warunku „gems = 10” program sprawdza, czy zmienna gems wynosi dokładnie 10. Jeśli gracz zbiera klejnoty partiami (np. po +3 naraz), gems przeskakuje z 9 do 12 — całkowicie pomijając 10. Warunek nigdy nie będzie prawdziwy. Rozwiązanie: zmień operator na ≥ (większe lub równe), co spowoduje wyzwolenie, gdy gems osiągnie 10 lub dowolną wyższą wartość."
            },
            {
                q: "Które z poniższych stwierdzeń poprawnie opisuje zakres zmiennych w MakeCode Education?",
                opts: [
                    "Wszystkie zmienne są globalne — dowolny blok zdarzenia w dowolnym miejscu programu może odczytywać i modyfikować każdą zmienną",
                    "Zmienne są lokalne dla bloku zdarzenia, w którym zostały utworzone — inne bloki nie mają do nich dostępu",
                    "Zmienne istnieją tylko wtedy, gdy blok zdarzenia, który je utworzył, jest aktywnie uruchomiony",
                    "Zmienne MakeCode muszą zostać zadeklarowane z określonym typem (liczba, tekst lub wartość logiczna), zanim będzie można ich użyć"
                ],
                correct: 0,  // A
                feedback: "Poprawnie. W MakeCode Education wszystkie zmienne są domyślnie globalne. Zmienna utworzona w bloku „Na starcie” jest w pełni dostępna i modyfikowalna wewnątrz bloków „Przy chodzeniu gracza”, „Przy zniszczeniu bloku” oraz wszystkich innych bloków zdarzeń. Nie ma lokalnych zakresów zmiennych. Upraszcza to kodowanie młodszym uczniom, ale oznacza, że muszą oni zachować ostrożność — dowolne zdarzenie może przypadkowo nadpisać zmienną."
            },
            {
                q: "Po osiągnięciu warunku wygranej (score ≥ 10) animacja fajerwerków ucznia uruchamia się przy każdym kroku chodzenia, a nie tylko raz. Jaka jest najdokładniejsza przyczyna techniczna?",
                opts: [
                    "Blok fajerwerków ma wewnętrzne ustawienie powtarzania, które jest ustawione jako „nieskończone”",
                    "Zdarzenie „Przy chodzeniu gracza” ma wbudowany błąd podwójnego wyzwalania, który aktywuje się dwukrotnie przy każdym kroku",
                    "Operator porównania ≥ powinien zostać zmieniony na =, aby zapobiec ponownemu wyzwalaniu warunku",
                    "Wynik nie jest resetowany do 0 (lub stan gry nie jest zmieniany) wewnątrz bloku warunku wygranej — score pozostaje ≥ 10 po pierwszej wygranej, więc każdy kolejny krok chodzenia ponownie uruchamia warunek"
                ],
                correct: 3,  // D
                feedback: "Poprawnie. Po wyzwoleniu wygranej, jeśli wynik pozostaje na poziomie 10 (lub wyższym), każdy kolejny krok chodzenia ewaluuje „jeśli score ≥ 10” → prawda → ponownie odpalają się fajerwerki. Rozwiązanie: albo dodaj „ustaw score = 0” jako ostatnią linię wewnątrz bloku wygranej (reset do ponownej gry), albo wprowadź zmienną logiczną „gameActive” ustawianą na fałsz przy wygranej, a następnie owiń cały blok chodzenia w „jeśli gameActive = prawda”."
            },
            {
                q: "Tutor chce pomóc uczniowi uniknąć umieszczania kodu poza blokiem zdarzenia. Która technika pedagogiczna jest najskuteczniejsza, zanim uczeń zacznie kodować?",
                opts: [
                    "Poproszenie ucznia o patrzenie na ekran tutora, podczas gdy ten buduje program, a następnie skopiowanie go",
                    "Poproszenie ucznia o narysowanie prostokąta na papierze, oznaczenie go nazwą bloku zdarzenia i fizyczne zdecydowanie, które instrukcje należą do środka, a które na zewnątrz, przed uruchomieniem MakeCode",
                    "Danie uczniowi gotowego programu do zmodyfikowania, zamiast budowania od zera",
                    "Powiedzenie uczniowi, aby sprawdził stronę z dokumentacją MakeCode, jeśli nie jest pewien co do umieszczenia bloków"
                ],
                correct: 1,  // B
                feedback: "Poprawnie. Technika „rysowania granic bloku” fizycznie uzewnętrznia kognitywne zadanie zawierania bloków. Uczniowie, którzy rysują prostokąt przed kodowaniem, popełniają błąd wewnątrz/zewnątrz znacznie rzadziej, ponieważ granica staje się namacalnym pojęciem przestrzennym, a nie abstrakcyjną regułą strukturalną. Wymaga to również od ucznia planowania przed kodowaniem — co stanowi fundamentalny nawyk zawodowego programisty."
            },
            {
                q: "Uczeń chce, aby jego program wyświetlał tekst „Bieżący wynik: 7”, gdy gracz chodzi. Umieszcza blok „say” zawierający tylko zmienną „score”. Wynik na ekranie pokazuje „7”, ale bez tekstu etykiety. Jak należy to naprawić?",
                opts: [
                    "Dodanie drugiego, osobnego bloku „say”, który wyświetla tylko tekst etykiety; MakeCode wyświetli je razem",
                    "Użycie bloku „print” zamiast „say” — print obsługuje połączony tekst",
                    "Użycie bloku „połącz tekst” (text join) do połączenia ciągu znaków \"Bieżący wynik: \" ze zmienną score, a następnie przekazanie połączonego wyniku do jednego bloku „say”",
                    "Zmienne nie mogą być wyświetlane w grze za pomocą „say” — muszą być pokazywane wyłącznie w konsoli MakeCode"
                ],
                correct: 2,  // C
                feedback: "Poprawnie. Blok „say” przyjmuje jedną wartość. Aby połączyć tekst i zmienną, uczniowie muszą użyć bloku „połącz tekst”: [join [\"Bieżący wynik: \"] [score]] → daje to jeden połączony ciąg znaków „Bieżący wynik: 7”, który jest następnie przekazywany do bloku „say”. Dwa osobne bloki „say” wyświetliłyby tekst w osobnych liniach, zamiast go połączyć."
            }
        ];

        let current = 0, answers = [], answered = false;
        const LETTERS = ['A', 'B', 'C', 'D'];

        function renderQuestion() {
            const q = QUESTIONS[current];
            answered = false;
            document.getElementById('q-count').textContent = `${current} / ${QUESTIONS.length}`;
            document.getElementById('q-prog').style.width = `${current / QUESTIONS.length * 100}%`;
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('feedback-area').innerHTML = '';
            document.getElementById('question-area').innerHTML = `
        <div class="qnum">Pytanie ${current + 1} z ${QUESTIONS.length}</div>
        <div class="qtext">${q.q}</div>
        <div class="opt-list" id="opt-list">
          ${q.opts.map((o, i) => `
            <div class="opt" id="opt-${i}" onclick="selectOpt(${i})">
              <span class="opt-letter">${LETTERS[i]}</span><span>${o}</span>
            </div>`).join('')}
        </div>`;
        }

        function selectOpt(i) {
            if (answered) return;
            answered = true;
            const q = QUESTIONS[current];
            answers[current] = i;
            for (let j = 0; j < q.opts.length; j++) {
                const el = document.getElementById(`opt-${j}`);
                el.classList.add('disabled');
                if (j === q.correct) el.classList.add('correct');
                else if (j === i) el.classList.add('wrong');
            }
            const isRight = i === q.correct;
            document.getElementById('feedback-area').innerHTML = `
        <div class="feedback-box ${isRight ? 'ok' : 'bad'} show">
          ${isRight ? '✅ ' : '❌ '} ${q.feedback}
        </div>`;
            if (current < QUESTIONS.length - 1) document.getElementById('next-btn').style.display = 'inline-flex';
            else document.getElementById('submit-btn').style.display = 'inline-flex';
        }

        function nextQuestion() { current++; renderQuestion(); window.scrollTo(0, 0); }

        function submitQuiz() {
            const score = answers.filter((a, i) => a === QUESTIONS[i].correct).length;
            const pct = Math.round(score / QUESTIONS.length * 100);
            const passed = pct >= PASS_PCT;
            if (passed) { const prev = getModuleScore(MODULE_ID); if (!prev || pct > prev) markModulePassed(MODULE_ID, pct); }
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('results-screen').style.display = 'block';
            document.getElementById('result-card').innerHTML = `
        <div class="result-emoji">${passed ? '🎉' : '😅'}</div>
        <div class="result-title">${passed ? 'Moduł 3 Ukończony!' : 'To jeszcze nie to'}</div>
        <div class="result-pct ${passed ? 'pass' : 'fail'}">${pct}%</div>
        <div class="result-sub">Odpowiedziałeś poprawnie na <strong>${score} z ${QUESTIONS.length}</strong> pytań.
          ${passed ? ' Doskonale — Moduł 3 został ukończony!'
                    : ` Wymagany jest wynik na poziomie <strong>${PASS_PCT}%</strong>. Przejrzyj materiał i spróbuj ponownie.`}
        </div>`;
            document.getElementById('result-actions').innerHTML = passed
                ? `<a href="PlModule4.html" class="btn-primary">Przejdź do Modułu 4 →</a>
           <button class="btn-outline" onclick="goHome()">← Pulpit</button>`
                : `<button class="btn-primary" onclick="retake()">Powtórz test</button>
           <a href="PlModule3.html" class="btn-outline">← Przejrzyj Moduł 3</a>`;
            window.scrollTo(0, 0);
        }

        function retake() {
            current = 0; answers = [];
            document.getElementById('quiz-screen').style.display = 'block';
            document.getElementById('results-screen').style.display = 'none';
            renderQuestion(); window.scrollTo(0, 0);
        }

        initShared();
        if (!isModuleUnlocked(MODULE_ID)) { alert('Najpierw ukończ poprzednie moduły.'); goHome(); }
        document.getElementById('top-progress').style.width = `${getOverallProgress() / 5 * 100}%`;
        renderQuestion();
    </script>
</body>
</html>
