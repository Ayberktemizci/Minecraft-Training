<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Modułu 5 — Zamek Twórcy | Kodland</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  .quiz-header{
    background:linear-gradient(135deg,#7E22CE,#EC4899);
    padding:24px 32px; color:#fff; text-align:center;
  }
  .quiz-header h2{
    font-family:'Nunito',sans-serif; font-size:22px;
    font-weight:900; color:#fff; margin-bottom:4px;
  }
  .quiz-header p{ color:rgba(255,255,255,.85); font-size:13px; }

  .feedback-box{
    display:none; margin-top:14px; border-radius:var(--rsm);
    padding:13px 16px; font-size:13.5px; line-height:1.6; border:2px solid;
  }
  .feedback-box.show{ display:block; }
  .feedback-box.ok{ background:var(--ok-bg); border-color:var(--ok-b); color:var(--ok-t); }
  .feedback-box.bad{ background:var(--no-bg); border-color:var(--no-b); color:var(--no-t); }

  /* ── Wynik pozytywny — karta kolejnego kroku ── */
  .next-step-card{
    margin-top:18px; background:linear-gradient(135deg,#0e1f0a,#2f5a1e);
    border:2px solid rgba(196,240,70,.3); border-radius:var(--r);
    padding:22px 24px; text-align:center; position:relative; overflow:hidden;
  }
  .next-step-card::before{
    content:''; position:absolute; inset:0;
    background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(196,240,70,.1) 0%,transparent 75%);
    pointer-events:none;
  }
  .next-step-card h4{
    font-family:'Nunito',sans-serif; font-size:16px; font-weight:900;
    color:#fff; margin-bottom:6px; position:relative;
  }
  .next-step-card p{
    font-size:13px; color:rgba(255,255,255,.68); line-height:1.55;
    margin-bottom:14px; position:relative; max-width:440px;
    margin-left:auto; margin-right:auto;
  }
  .next-step-card .btn-row{ justify-content:center; position:relative; }
  .btn-library-cta{
    display:inline-flex; align-items:center; gap:8px;
    padding:12px 28px; border-radius:var(--rpill);
    background:var(--lime); color:var(--ink);
    font-family:'Nunito',sans-serif; font-size:14px; font-weight:900;
    border:2px solid var(--lime-d); text-decoration:none;
    transition:all .15s; letter-spacing:.2px;
  }
  .btn-library-cta:hover{
    background:var(--lime-d); transform:translateY(-2px);
    box-shadow:0 6px 20px rgba(196,240,70,.35);
  }
  .btn-lvl2{
    display:inline-flex; align-items:center; gap:8px;
    padding:12px 28px; border-radius:var(--rpill);
    background:#F03D9E; color:#fff;
    font-family:'Nunito',sans-serif; font-size:14px; font-weight:900;
    border:2px solid #C0307A; text-decoration:none;
    transition:all .15s; letter-spacing:.2px;
  }
  .btn-lvl2:hover{ background:#C0307A; transform:translateY(-2px); box-shadow:0 6px 20px rgba(240,61,158,.4); }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo" onclick="goHome()" style="cursor:pointer">
    <span class="logo-mark">Kodland</span><div class="logo-div"></div>
    <span class="logo-sub">Szkolenie dla Tutorów</span>
  </div>
  <div class="nav-r">
    <button class="nav-back" onclick="history.back()">← Moduł 5</button>
    <button class="icon-btn" id="theme-toggle">🌙</button>
  </div>
</nav>
<div class="progress-strip"><div class="progress-fill" id="top-progress" style="width:0%"></div></div>

<div class="quiz-header">
  <h2>📝 Sprawdzian Wiedzy z Modułu 5</h2>
  <p>🏰 Zamek Twórcy · 6 pytań · 70% do zaliczenia · Odblokowuje etapy końcowe</p>
</div>

<!-- EKRAN TESTU -->
<div id="quiz-screen" class="quiz-wrap">
  <div class="q-progress">
    <div class="q-prog-track"><div class="q-prog-fill" id="q-prog" style="width:0%"></div></div>
    <span class="q-count" id="q-count">0 / 6</span>
  </div>
  <div id="question-area"></div>
  <div id="feedback-area"></div>
  <div class="btn-row" style="margin-top:16px">
    <button class="btn-primary" id="next-btn" onclick="nextQuestion()" style="display:none">Następne pytanie →</button>
    <button class="btn-primary" id="submit-btn" onclick="submitQuiz()" style="display:none">Prześlij odpowiedzi</button>
  </div>
</div>

<!-- EKRAN WYNIKÓW -->
<div id="results-screen" style="display:none;padding:40px 24px">
  <div class="result-card" id="result-card"></div>
  <div id="result-actions"></div>
</div>

<footer>© 2026 Kodland. Wewnętrzny materiał szkoleniowy dla tutorów.</footer>

<script src="shared.js"></script>
<script>
const MODULE_ID = 5;
const PASS_PCT  = 70;

const QUESTIONS = [
  {
    q: "Uczeń definiuje w MakeCode Funkcję o nazwie 'openGate', która porusza Tłokiem i odtwarza dźwięk. Po dodaniu definicji Funkcji brama nie otwiera się, gdy gracz wchodzi na Płytę Naciskową. Zdarzenie „Gdy gracz idzie” nie ma w środku żadnych bloków. Jaka jest dokładna przyczyna i rozwiązanie?",
    opts: [
      "Nazwa Funkcji 'openGate' jest zarezerwowana — należy ją zmienić na taką, która nie zawiera słowa 'Gate'",
      "Blok Tłoka wewnątrz Funkcji musi zostać zastąpiony bezpośrednim blokiem sygnału Redstone",
      "Definicja Funkcji działa tylko wtedy, gdy gracz znajduje się w promieniu 10 bloków od zdefiniowanej lokalizacji",
      "Funkcja jest zdefiniowana, ale nigdy nie wywołana — blok „Wywołaj Funkcję openGate” musi zostać umieszczony wewnątrz zdarzenia „Gdy gracz idzie”, aby Funkcja wykonała się po wyzwoleniu zdarzenia"
    ],
    correct: 3,
    feedback: "Poprawnie. Zdefiniowanie Funkcji tworzy nazwany, wielokrotnego użytku blok kodu — ale nigdy nie wykona się on samodzielnie. Funkcja musi zostać jawnie wywołana z wnętrza obsługi zdarzenia. Bez bloku „Wywołaj Funkcję openGate” wewnątrz zdarzenia „Gdy gracz idzie”, definicja Funkcji istnieje w pamięci, ale nigdy nie zostaje wyzwolona. Rozwiązanie: otwórz blok zdarzenia „Gdy gracz idzie” i dodaj w jego wnętrzu blok „Wywołaj Funkcję openGate”."
  },
  {
    q: "Dlaczego ustrukturyzowana Faza Blueprint wymaga, aby uczniowie wpisywali swoją zgodę na czacie („Zgadzam się z tym planem: [imię]”), zamiast po prostu podnosić rękę lub potwierdzać ustnie?",
    opts: [
      "Pisanie jest szybsze niż potwierdzenie ustne i oszczędza czas podczas sesji",
      "Pisanie tworzy widoczne, trwałe zobowiązanie społeczne w zapisie czatu — jeśli uczeń później spróbuje zmienić kierunek w trakcie budowy, tutor może odwołać się do jego własnej wpisanej zgody, co drastycznie ogranicza zmiany kierunku w trakcie budowy oraz rozrastanie się zakresu",
      "Czat w grze automatycznie rejestruje wpisane zgody jako formalną, wiążącą umowę",
      "Potwierdzenie ustne nie jest dozwolone podczas sesji ze względu na jakość dźwięku"
    ],
    correct: 1,
    feedback: "Poprawnie. Celem wpisanego zobowiązania jest odpowiedzialność społeczna poprzez widoczny, trwały zapis. Uczniowie, którzy wpisali „Zgadzam się z tym planem” na czacie, są znacznie mniej skłonni opowiadać się później za zmianą kierunku — ich wcześniejsze zobowiązanie jest widoczne dla wszystkich i tworzy presję spójności z samym sobą. Zgody ustne są prywatne i ulotne; zgody wpisane na czacie są publiczne i trwałe."
  },
  {
    q: "W pętli Buduj → Debuguj → Dekoruj uczeń chce dodać kolorowe sztandary i niestandardowe wzory podłogi do swojego projektu mostu zwodzonego, zanim sprawdzi, czy most rzeczywiście się otwiera. Co powinien zrobić tutor?",
    opts: [
      "Natychmiast skierować ucznia z powrotem do fazy Debugowania: wyjaśnić, że dekorowanie przed debugowaniem oznacza, iż wszelkie znalezione błędy będą wymagać rozbierania dekoracji, aby dostać się do obwodu — właśnie dlatego kolejność pętli jest ścisła. Sztandary trafiają na listę zadań „Po debugowaniu”.",
      "Pozwolić na to — dekoracja jest osobnym systemem i nie może wpłynąć na obwód Redstone pod nią",
      "Pozwolić uczniowi zdecydować — kolejność pętli to wskazówka, a nie zasada",
      "Wstrzymać zajęcia i kazać uczniowi zademonstrować, że most zwodzony działa, zanim pozwoli się dowolnemu innemu uczniowi kontynuować"
    ],
    correct: 0,
    feedback: "Poprawnie. Kolejność Buduj → Debuguj → Dekoruj jest ścisła właśnie dlatego, że dekoracja zbudowana na nieprzetestowanym obwodzie tworzy narastający problem: jeśli błąd zostanie znaleziony w fazie dekoracji, dostęp do obwodu wymaga rozebrania dekoracji — zmarnowana praca i stracony czas. Tutor musi natychmiast przekierować ucznia, dodać pomysł sztandarów do listy zadań „Po debugowaniu” i wyjaśnić, dlaczego kolejność ma znaczenie."
  },
  {
    q: "Projekt ucznia spełnił wszystkie kryteria sukcesu z Fazy Blueprint, gdy do końca sesji zostało 15 minut. Uczeń prosi o dodanie 3 nowych funkcji. Jaka jest prawidłowa reakcja tutora?",
    opts: [
      "Pozwolić na wszystkie 3 funkcje — uczniów należy zawsze zachęcać do poszerzania ambicji",
      "Pozwolić na 1 funkcję, wybraną przez ucznia jako najważniejsza",
      "Zapisać wszystkie 3 pomysły na liście „Wersja 2” na czacie, pozytywnie je docenić, a następnie przekierować ucznia do Fazy Dekoracji — nowe funkcje w ostatnich 15 minutach grożą zepsuciem działającego prototypu przed Premierą w Studiu Gier",
      "Zakończyć sesję wcześniej, skoro kryteria sukcesu zostały spełnione"
    ],
    correct: 2,
    feedback: "Poprawnie. Technika listy „Wersja 2” osiąga dwie rzeczy jednocześnie: pomysły ucznia są docenione i zapisane (a nie odrzucone), a zakres produkcji pozostaje chroniony. Dodawanie nowych funkcji w ostatnich 15 minutach niesie realne ryzyko zepsucia działającego prototypu przed prezentacją — tutor musi chronić to, co już działa. Po zapisaniu pomysłów do Wersji 2, przekieruj ucznia do Fazy Dekoracji, która produktywnie wykorzystuje pozostały czas bez dotykania działających systemów."
  },
  {
    q: "Jaki jest główny powód, dla którego nazwanie końcowej prezentacji Modułu 5 „Premierą w Studiu Gier” zamiast „pokazem klasowym” daje wymiernie lepsze prezentacje uczniów?",
    opts: [
      "Dłuższa nazwa daje uczniom więcej czasu na przygotowanie treści prezentacji",
      "Rodzice reagują bardziej pozytywnie na słowo „studio” niż „pokaz”",
      "Używa terminologii branżowej zgodnej z wytycznymi marki Kodland",
      "Język kształtuje zachowanie i oczekiwania — „Premiera w Studiu Gier” ustala profesjonalny standard, który uczniowie internalizują jako wymagający technicznego wyjaśnienia, demonstracji na żywo i publicznej odpowiedzialności za swoją pracę, podczas gdy „pokaz klasowy” sugeruje nieformalną aktywność szkolną"
    ],
    correct: 3,
    feedback: "Poprawnie. Język użyty do opisania aktywności bezpośrednio wpływa na wysiłek i jakość, które uczniowie w nią wkładają. „Pokaz klasowy” jest kulturowo kojarzony ze swobodnymi, mało wymagającymi aktywnościami z dzieciństwa. „Premiera w Studiu Gier” kojarzy się z profesjonalnymi premierami produktów, wymagającymi wyjaśnienia, demonstracji na żywo i publicznej odpowiedzialności. Uczniowie, którzy słyszą „premiera”, przygotowują się inaczej — ćwiczą, zastanawiają się, co powiedzieć, sprawdzają, czy ich demo działa."
  },
  {
    q: "Zespół składa się z trzech uczniów i ma rozpocząć Moduł 5. Faza Blueprint przydziela cztery role: Architekt, Programista, Dekorator i Prezenter. Jak tutor powinien poradzić sobie z tą rozbieżnością?",
    opts: [
      "Całkowicie pominąć przydział ról — role są opcjonalne dla grup liczących 3 lub mniej osób",
      "Logicznie połączyć role: Architekt + Dekorator (wizja konstrukcyjna i wykończenie wizualne), Programista (cała logika MakeCode i Redstone) oraz Prezenter, który dodatkowo wspiera jedną z pozostałych ról. Każdy uczeń wciąż ma główny obszar odpowiedzialności, a zespół omawia, która kombinacja ma sens dla ich konkretnego typu projektu i indywidualnych mocnych stron",
      "Poprosić czwartego ucznia z innego zespołu, aby dołączył i wypełnił brakującą rolę",
      "Przydzielić wszystkie cztery role trzem uczniom, dając jednemu uczniowi dwie główne role — staje się on jednocześnie Architektem i Programistą"
    ],
    correct: 1,
    feedback: "Poprawnie. Łączenie ról to standardowe rozwiązanie, gdy liczebność zespołu nie odpowiada liczbie ról. Logiczna kombinacja dla 3-osobowego zespołu to: (1) Architekt + Dekorator — jeden uczeń odpowiada zarówno za projekt konstrukcyjny, jak i wykończenie wizualne; (2) Programista — pełna odpowiedzialność za cały kod i Redstone; (3) Prezenter, który dodatkowo wspiera osobę mającą w danym momencie najwięcej pracy. Kluczowa zasada jest taka, że każdy uczeń wciąż ma główny obszar odpowiedzialności — łączenie ról nie może prowadzić do tego, że jeden uczeń dominuje nad wszystkimi decyzjami."
  }
];

let current = 0, answers = [], answered = false;
const LETTERS = ['A','B','C','D'];

function renderQuestion() {
  const q = QUESTIONS[current];
  answered = false;
  document.getElementById('q-count').textContent = `${current} / ${QUESTIONS.length}`;
  document.getElementById('q-prog').style.width   = `${current / QUESTIONS.length * 100}%`;
  document.getElementById('next-btn').style.display   = 'none';
  document.getElementById('submit-btn').style.display = 'none';
  document.getElementById('feedback-area').innerHTML  = '';
  document.getElementById('question-area').innerHTML  = `
    <div class="qnum">Pytanie ${current + 1} z ${QUESTIONS.length}</div>
    <div class="qtext">${q.q}</div>
    <div class="opt-list" id="opt-list">
      ${q.opts.map((o, i) => `
        <div class="opt" id="opt-${i}" onclick="selectOpt(${i})">
          <span class="opt-letter">${LETTERS[i]}</span><span>${o}</span>
        </div>`).join('')}
    </div>`;
}

function selectOpt(i) {
  if (answered) return;
  answered = true;
  const q = QUESTIONS[current];
  answers[current] = i;
  for (let j = 0; j < q.opts.length; j++) {
    const el = document.getElementById(`opt-${j}`);
    el.classList.add('disabled');
    if (j === q.correct) el.classList.add('correct');
    else if (j === i)    el.classList.add('wrong');
  }
  const isRight = i === q.correct;
  document.getElementById('feedback-area').innerHTML = `
    <div class="feedback-box ${isRight ? 'ok' : 'bad'} show">
      ${isRight ? '✅ ' : '❌ '} ${q.feedback}
    </div>`;
  if (current < QUESTIONS.length - 1)
    document.getElementById('next-btn').style.display   = 'inline-flex';
  else
    document.getElementById('submit-btn').style.display = 'inline-flex';
}

function nextQuestion() {
  current++;
  renderQuestion();
  window.scrollTo(0, 0);
}

function submitQuiz() {
  const score  = answers.filter((a, i) => a === QUESTIONS[i].correct).length;
  const pct    = Math.round(score / QUESTIONS.length * 100);
  const passed = pct >= PASS_PCT;

  if (passed) {
    const prev = getModuleScore(MODULE_ID);
    if (!prev || pct > prev) markModulePassed(MODULE_ID, pct);
  }

  document.getElementById('quiz-screen').style.display    = 'none';
  document.getElementById('results-screen').style.display = 'block';

  document.getElementById('result-card').innerHTML = `
    <div class="result-emoji">${passed ? '🏆' : '😅'}</div>
    <div class="result-title">${passed ? 'Wszystkie 5 Modułów Ukończonych!' : 'To jeszcze nie to'}</div>
    <div class="result-pct ${passed ? 'pass' : 'fail'}">${pct}%</div>
    <div class="result-sub">Odpowiedziałeś poprawnie na <strong>${score} z ${QUESTIONS.length}</strong> pytań.
      ${passed
        ? ' Wspaniale — ukończyłeś wszystkie pięć modułów szkoleniowych.'
        : ` Do dalszego postępu wymagany jest wynik na poziomie <strong>${PASS_PCT}%</strong> lub wyższym. Przejrzyj Moduł 5 i spróbuj ponownie.`}
    </div>`;

  if (passed) {
    document.getElementById('result-actions').innerHTML = `
      <div class="next-step-card">
        <h4>🏆 Poziom 1 Ukończony — Szkolenie Trwa Dalej na Poziomie 2</h4>
        <p>Ukończyłeś wszystkie pięć modułów Poziomu 1. Przejrzyj Bibliotekę Udanych Lekcji, a następnie kontynuuj swoją podróż z Minecraft Poziom 2, gdzie czeka końcowy Test Umiejętności Cyfrowych.</p>
        <div class="btn-row">
          <a href="PlDST.html#library" class="btn-library-cta">📖 Zobacz Wzorce Udanych Lekcji →</a>
          <a href="../Level2/PlLv2.html" class="btn-lvl2">🚀 Przejdź do Minecraft Poziom 2 →</a>
        </div>
      </div>
      <div class="btn-row center" style="margin-top:14px">
        <button class="btn-outline" onclick="goHome()">← Pulpit</button>
      </div>`;
  } else {
    document.getElementById('result-actions').innerHTML = `
      <div class="btn-row center" style="margin-top:0">
        <button class="btn-primary" onclick="retake()">Powtórz test</button>
        <a href="PlModule5.html" class="btn-outline">← Przejrzyj Moduł 5</a>
      </div>`;
  }

  window.scrollTo(0, 0);
}

function retake() {
  current = 0; answers = [];
  document.getElementById('quiz-screen').style.display    = 'block';
  document.getElementById('results-screen').style.display = 'none';
  renderQuestion();
  window.scrollTo(0, 0);
}

initShared();
if (!isModuleUnlocked(MODULE_ID)) {
  alert('Najpierw ukończ poprzednie moduły.');
  goHome();
}
document.getElementById('top-progress').style.width = `${getOverallProgress() / 5 * 100}%`;
renderQuestion();
</script>
</body>
</html>
